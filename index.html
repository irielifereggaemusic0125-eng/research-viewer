// ===== 下見タブ: GO/見送り判断（Tampermonkeyブリッジ経由） =====
const INS_DECS_KEY='ins_decisions_v1';
const insItemMap={};
function insDecsLoad(){try{return JSON.parse(localStorage.getItem(INS_DECS_KEY)||'{}');}catch(e){return{};}}
function insDecsSave(d){localStorage.setItem(INS_DECS_KEY,JSON.stringify(d));}

// Tampermonkeyブリッジ: postMessage → GM.xmlhttpRequest → localhost:8765
let _relayId=0;
const _relayWaiters={};
let _relayReady=false;
window.addEventListener('message',(e)=>{
  if(!e.data||e.source!==window) return;
  if(e.data.type==='banshee_relay_ready') _relayReady=true;
  if(e.data.type==='banshee_relay_result'){
    const cb=_relayWaiters[e.data.reqId];
    if(cb){delete _relayWaiters[e.data.reqId]; cb(e.data.result);}
  }
});
function relayPost(action,payload){
  return new Promise((resolve)=>{
    const reqId=++_relayId;
    _relayWaiters[reqId]=resolve;
    window.postMessage({type:'banshee_relay',action,payload,reqId},'*');
    setTimeout(()=>{
      if(_relayWaiters[reqId]){delete _relayWaiters[reqId]; resolve(null);}
    },5000);
  });
}

// ③ 見送り理由のタグ判定（judgment_log.py の REASON_TAGS と対応）
const INS_REASON_TAGS=[
  [/色落ち|変色|くすみ|黒ずみ/,'色/変色'],[/傷|スレ|擦れ|ダメージ/,'傷/スレ'],
  [/金具|留め具|クラスプ|バネ/,'金具'],[/真贋|偽物|本物|怪しい|ギャラ無/,'真贋懸念'],
  [/高い|高値|指値|予算|利幅|薄利/,'価格/利幅'],[/状態|ランク|程度/,'状態'],
  [/写真|画像|暗い|見えな/,'写真不足'],[/サイズ|号数|大き|小さ/,'サイズ'],
  [/人気|不人気|回転|売れ/,'需要/回転'],[/付属|箱|保証|ギャラ/,'付属品'],
];
function insTagReason(reason){
  const t=[]; for(const[re,name]of INS_REASON_TAGS){ if(re.test(reason||'')) t.push(name); }
  return t.length?t:['その他'];
}
// ③ 見送り理由チェックリスト（label=表示, kw=タグ判定に使うキーワード）
const INS_SKIP_REASONS=[
  ['変色・色落ち','変色'],['傷・スレ','傷スレ'],['金具の難','金具'],['真贋が怪しい','真贋'],
  ['利幅が薄い','利幅'],['状態・ランク不安','状態'],['写真が不足','写真'],['サイズ不安','サイズ'],
  ['回転が悪い','回転'],['付属品なし','付属'],
];

async function insJudge(itemNo,decision,reasonOverride){
  if(!insItemMap[itemNo]) return;
  const btnGo=document.getElementById('ins-go-'+itemNo);
  const btnSkip=document.getElementById('ins-skip-'+itemNo);
  const btn=decision==='go'?btnGo:btnSkip;
  if(btn){btn.textContent='…';btn.classList.add('loading');btn.disabled=true;}
  if(btnGo)btnGo.disabled=true; if(btnSkip)btnSkip.disabled=true;

  const it=insItemMap[itemNo];
  const e=(insEditsLoad()[itemNo])||{};
  const jissei=e.jissei||it.jissei||0;
  const bid=e.bid||0;
  const profit=(jissei&&bid)?Math.round(jissei*0.9-bid):(it.profit||0);
  const reason=reasonOverride||(decision==='go'?`下見GO bid=¥${bid.toLocaleString('ja-JP')}`:'下見見送り');
  const reason_tags=decision==='skip'?insTagReason(reason):[];
  const payload={item_no:itemNo,name:it.name,brand:it.brand,tier:it.tier,
    jissei,bid,profit,deadline:it.deadline,current_price:it.current_price,reason};

  const result=await relayPost(decision,payload);
  const server_ok=result?!!result.ok:null;

  const decs=insDecsLoad();
  decs[itemNo]={decision,decided_at:new Date().toISOString(),bid,jissei,server_ok,reason,reason_tags};
  insDecsSave(decs);
  // ステータスが変わるので再描画→未判断ビューから自動的に消える
  renderInspect();
}

// ③ 判断を取り消して未判断に戻す（再リサーチ可能に）
function insUndo(itemNo){
  const decs=insDecsLoad(); delete decs[itemNo]; insDecsSave(decs);
  renderInspect();
}

// ③ 見送り理由チェックリストのモーダルを開く
function insSkipPrompt(itemNo){
  const it=insItemMap[itemNo]; if(!it) return;
  const ov=document.getElementById('ins-skip-modal');
  document.getElementById('ins-skip-title').textContent=(it.name||'').slice(0,40);
  document.getElementById('ins-skip-checks').innerHTML=INS_SKIP_REASONS.map((r,i)=>
    `<label class="ins-rc"><input type="checkbox" value="${r[1]}"> ${r[0]}</label>`).join('');
  document.getElementById('ins-skip-note').value='';
  ov.dataset.itemNo=itemNo;
  ov.style.display='flex';
}
function insSkipCancel(){ document.getElementById('ins-skip-modal').style.display='none'; }
function insSkipConfirm(){
  const ov=document.getElementById('ins-skip-modal');
  const itemNo=ov.dataset.itemNo;
  const kws=[...ov.querySelectorAll('#ins-skip-checks input:checked')].map(c=>c.value);
  const note=document.getElementById('ins-skip-note').value.trim();
  const reason='見送り: '+([...kws,note].filter(Boolean).join(', ')||'理由未記入');
  ov.style.display='none';
  insJudge(itemNo,'skip',reason);
}

// ===== 下見タブ: 手入力実勢・入札額（localStorage永続） =====
const INS_EDITS_KEY='ins_edits_v1';
function insEditsLoad(){try{return JSON.parse(localStorage.getItem(INS_EDITS_KEY)||'{}');}catch(e){return {};}}
function insEditsSave(d){localStorage.setItem(INS_EDITS_KEY,JSON.stringify(d));}
function insFormatInput(el){const r=el.value.replace(/[^\d]/g,'');el.value=r?parseInt(r,10).toLocaleString('ja-JP'):'';}
function insSetField(key,field,raw){
  const d=insEditsLoad(); if(!d[key])d[key]={};
  const v=parseInt(raw.replace(/[^\d]/g,''),10);
  if(v>0)d[key][field]=v; else delete d[key][field];
  if(!Object.keys(d[key]).length)delete d[key];
  insEditsSave(d); insUpdateCalc(key);
}
function insUpdateCalc(key){
  const el=document.getElementById('ins-calc-'+key); if(!el)return;
  const e=(insEditsLoad()[key])||{};
  const j=e.jissei||0,b=e.bid||0;
  if(!j&&!b){el.innerHTML='';return;}
  let html='';
  if(j&&b){
    const profit=Math.round(j*0.9-b);
    const ratio=Math.round(b/j*100);
    const cls=profit>=0?'pos':'neg';
    const sign=profit>=0?'+':'-';
    html=`<span class="iv-calc-${cls}">粗利 ${sign}¥${Math.abs(profit).toLocaleString('ja-JP')}</span><span style="color:var(--line);margin:0 4px">·</span><span class="iv-calc-ratio">入札/実勢 ${ratio}%</span>`;
  }else if(j){
    html=`<span class="iv-calc-pos">売値×0.9 = ¥${Math.round(j*0.9).toLocaleString('ja-JP')}</span>`;
  }else{
    html=`<span class="iv-calc-ratio">入札 ¥${b.toLocaleString('ja-JP')}</span>`;
  }
  el.innerHTML=html;
}

// ===== 下見タブ（EcoAuc下見・ecoauc_inspect.json） =====
let inspectData = null;
const insBrands = new Set();   // ブランドフィルタ(複数)
const insCats = new Set();      // カテゴリフィルタ(複数)
let insPrice = 'all';           // 価格帯(単一)
let insStatusFilter = 'pending'; // ③ ステータス絞り込み: pending(未判断)|bidding(入札中)|done(処理済み)

const INS_PRICE_DEFS = [['all','すべて',0,Infinity],['p5','〜5千',0,5000],['p10','〜1万',0,10000],['p30','〜3万',0,30000],['p30over','3万超',30000,Infinity]];

function insDeadlineLabel(dl){
  if(!dl) return '締切未定';
  const d=new Date(dl); if(isNaN(d)) return '締切未定';
  const h=Math.round((d-new Date())/3600000);
  if(h<0) return '締切済';
  if(h<24) return `⚠️あと${h}時間`;
  return `あと${Math.ceil(h/24)}日`;
}
function insHours(dl){ if(!dl)return null; const d=new Date(dl); return isNaN(d)?null:Math.round((d-new Date())/3600000); }
// ③ 締切が過去なら終了(処理済み扱い)
function insIsEnded(dl){ if(!dl)return false; const d=new Date(dl); return isNaN(d)?false:(d-new Date())<=0; }
// ③ 商品のステータス: done(見送り or 終了) / bidding(GO・進行中) / pending(未判断)
function insItemStatus(it){
  const dec=(insDecsLoad()[it.item_no]||{}).decision;
  if(dec==='skip') return 'done';
  if(insIsEnded(it.deadline)) return 'done';
  if(dec==='go') return 'bidding';
  return 'pending';
}
function insSetStatus(s){ insStatusFilter=s; renderInspect(); }

async function showInspect(){
  const main=document.getElementById('cards');
  if(!inspectData){
    main.innerHTML='<div class="empty"><div style="font-size:28px;margin-bottom:8px">🔭</div><div>読み込み中…</div></div>';
    try{
      const r=await fetch('data/ecoauc_inspect.json?t='+Date.now(),{cache:'no-store'});
      if(!r.ok) throw new Error();
      inspectData=await r.json();
    }catch(e){
      main.innerHTML='<div class="empty"><div style="font-size:28px;margin-bottom:8px">🔭</div><div>下見データがまだありません</div><div style="font-size:11px;margin-top:6px;color:var(--muted2)">「ecoauc-inspect-fetch」を手動発火すると表示されます</div></div>';
      return;
    }
  }
  renderInspect();
}
function insToggleBrand(b){ insBrands.has(b)?insBrands.delete(b):insBrands.add(b); renderInspect(); }
function insToggleCat(c){ insCats.has(c)?insCats.delete(c):insCats.add(c); renderInspect(); }
function insSetPrice(p){ insPrice=p; renderInspect(); }
function insClear(){ insBrands.clear(); insCats.clear(); insPrice='all'; renderInspect(); }

function renderInspect(){
  const main=document.getElementById('cards');
  if(!inspectData) return;
  const all=inspectData.items||[];
  const brands=[...new Set(all.map(i=>i.brand).filter(Boolean))];
  const cats=[...new Set(all.map(i=>i.category).filter(Boolean))];
  const pdef=INS_PRICE_DEFS.find(p=>p[0]===insPrice)||INS_PRICE_DEFS[0];

  let baseItems=all.filter(i=>{
    if(insBrands.size && !insBrands.has(i.brand)) return false;
    if(insCats.size && !insCats.has(i.category)) return false;
    const pr=i.current_price||0;
    if(!(pr>=pdef[2] && pr<pdef[3])) return false;
    if(ngHideExcluded && ngCheck(i.name)?.level==='exclude') return false;   // NG除外
    return true;
  });
  // ③ ステータス別件数（ブランド/価格絞り込み後・ステータス絞り込み前）
  const statusCount={pending:0,bidding:0,done:0};
  baseItems.forEach(i=>{ statusCount[insItemStatus(i)]++; });
  // ③ ステータス絞り込み（デフォルト=未判断＝今アクションが必要なものだけ）
  let items=baseItems.filter(i=>insItemStatus(i)===insStatusFilter);
  // 回転実績の高い順（priority昇順→回転日数昇順→締切昇順）
  items.sort((a,b)=>{
    const pa=a.priority??99, pb=b.priority??99; if(pa!==pb) return pa-pb;
    const ka=a.kaiten??999, kb=b.kaiten??999; if(ka!==kb) return ka-kb;
    return (insHours(a.deadline)??99999)-(insHours(b.deadline)??99999);
  });

  const edits=insEditsLoad();
  const decs=insDecsLoad();
  Object.keys(insItemMap).forEach(k=>delete insItemMap[k]);
  const brandChips=brands.map(b=>`<button class="iv-chip${insBrands.has(b)?' on':''}" onclick="insToggleBrand('${b.replace(/'/g,"&apos;")}')">${b}</button>`).join('');
  const catChips=cats.map(c=>`<button class="iv-chip${insCats.has(c)?' on':''}" onclick="insToggleCat('${c.replace(/'/g,"&apos;")}')">${c}</button>`).join('');
  const priceChips=INS_PRICE_DEFS.map(p=>`<button class="iv-chip${insPrice===p[0]?' on':''}" onclick="insSetPrice('${p[0]}')">${p[1]}</button>`).join('');
  const STATUS_DEFS=[['pending','📋 未判断','今アクション要'],['bidding','🎯 入札中','GO済・進行中'],['done','✅ 処理済み','見送り・終了']];
  const statusChips=STATUS_DEFS.map(s=>`<button class="iv-stchip${insStatusFilter===s[0]?' on '+s[0]:''}" onclick="insSetStatus('${s[0]}')">${s[1]}<span class="iv-stnum">${statusCount[s[0]]}</span></button>`).join('');
  const TGT=isIOS()?'':' target="_blank" rel="noopener"';

  main.innerHTML=`
    <div class="iv-header"><span class="iv-title">🔭 EcoAuc下見</span><span class="iv-meta">全${all.length}件 / 更新:${inspectData.updated_at||'-'}</span></div>
    <div class="iv-status-bar">${statusChips}</div>
    <div class="iv-filter">
      <div class="iv-fg"><div class="iv-fl">🏷 ブランド</div><div class="iv-chips">${brandChips||'<span style="font-size:11px;color:var(--muted2)">データなし</span>'}</div></div>
      <div class="iv-fg"><div class="iv-fl">📦 カテゴリ</div><div class="iv-chips">${catChips}</div></div>
      <div class="iv-fg"><div class="iv-fl">💴 価格帯</div><div class="iv-chips">${priceChips}</div></div>
      <div class="iv-fg"><div class="iv-fl">🚫 NGワード</div><div class="iv-chips"><button class="iv-chip${ngHideExcluded?' on':''}" onclick="toggleNgHide()">除外を隠す</button></div></div>
    </div>
    <div class="iv-bar"><span class="iv-count">${STATUS_DEFS.find(s=>s[0]===insStatusFilter)[1]}: <b>${items.length}</b>件</span>
      <span class="iv-sum"><button class="wf-clear" onclick="insClear()">✕ クリア</button></span></div>
    ${items.length?items.map(it=>{
      const e=edits[it.item_no]||{};
      const sJ=e.jissei?e.jissei.toLocaleString('ja-JP'):'';
      const sB=e.bid?e.bid.toLocaleString('ja-JP'):'';
      insItemMap[it.item_no]={name:it.name,brand:it.brand,tier:it.tier,jissei:it.jissei||0,profit:it.profit||0,deadline:it.deadline,current_price:it.current_price||0};
      const decRec=decs[it.item_no]||{};
      const dec=decRec.decision;
      const st=insItemStatus(it);   // ③ pending|bidding|done
      const ended=insIsEnded(it.deadline);
      const stBadge=st==='bidding'?`<span class="iv-stbadge bidding">🎯入札中</span>`
        :(st==='done'?(dec==='skip'?`<span class="iv-stbadge skip">見送り</span>`:`<span class="iv-stbadge ended">🔚終了</span>`):'');
      const _ecoQ=[(it.brand||''),(it.name||'').slice(0,30)].filter(Boolean).join(' ');
      const ecoURL=_ecoQ?'https://www.ecoauc.com/client/auctions/inspect?q='+encodeURIComponent(_ecoQ)+'&limit=50&tableType=grid&page=1':null;
      const hi=!!it.highlight;          // 粗利¥5,000以上
      const hrs=insHours(it.deadline);
      const dueCls=hrs!==null&&hrs>=0&&hrs<24?'alert':(hrs!==null&&hrs<48?'warn':'ok');
      const ng=ngCheck(it.name);
      const ngCls=ng?(ng.level==='exclude'?' ng-excluded':' ng-warned'):'';
      const ngBadge=ng?(ng.level==='exclude'?`<span class="ng-flag ex">🚫${ng.word}</span>`:`<span class="ng-flag wn">⚠️${ng.word}</span>`):'';
      // 実績バッジ（回転日数/粗利率＝なぜ狙い目か）
      let perfBadge='';
      if(it.kaiten!=null||it.rieki!=null){
        const k=it.kaiten!=null?`回転${it.kaiten}日`:'';
        const r=it.rieki!=null?`粗利${it.rieki}%`:'';
        perfBadge=`<div class="ins-perf">${k?`<span class="ins-pb k">${k}</span>`:''}${r?`<span class="ins-pb r">${r}</span>`:''}</div>`;
      }
      return `<div class="iv-card ${hi?'ins-hi':''}${ngCls}${st==='bidding'?' ins-bidding':''}${st==='done'?' ins-done':''}">
        <div class="iv-card-top">
          ${it.tier?`<span class="iv-card-no">${it.tier}</span>`:''}
          <span class="iv-days ${dueCls}">${insDeadlineLabel(it.deadline)}</span>
          ${stBadge}
          <span class="iv-card-cat">${ngBadge}${it.brand||''}${it.category?' / '+it.category:''}</span>
        </div>
        <div class="iv-name">${it.name||''}${it.rank?` <span style="font-size:10px;color:var(--muted)">[${it.rank}]</span>`:''}</div>
        ${perfBadge}${sniperBadge(it)}
        <div class="iv-rows">
          <div class="iv-row"><span class="iv-rl">現在価格</span><span class="iv-rv">${it.current_price?'¥'+(+it.current_price).toLocaleString('ja-JP'):'—'}</span></div>
          ${it.jissei?`<div class="iv-row"><span class="iv-rl">実勢${it.confidence?`<span class="band-conf ${it.confidence}">信頼度${it.confidence}</span>`:''}</span><span class="iv-rv">${(it.jissei_low&&it.jissei_high)?`¥${(+it.jissei_low).toLocaleString('ja-JP')}〜¥${(+it.jissei_high).toLocaleString('ja-JP')}`:'¥'+(+it.jissei).toLocaleString('ja-JP')}</span></div>`:''}
          ${it.profit?`<div class="iv-row"><span class="iv-rl">想定粗利</span><span class="iv-rv ${hi?'':''}" style="color:${hi?'var(--profit)':'var(--text)'};font-weight:${hi?'800':'600'}">+¥${(+it.profit).toLocaleString('ja-JP')}${hi?' ★':''}</span></div>`:''}
        </div>
        <div class="iv-input-row">
          <div class="iv-input-grp">
            <span class="iv-input-lbl">実勢 ¥</span>
            <input class="iv-input" type="text" inputmode="numeric" placeholder="未入力" value="${sJ}"
              oninput="insSetField('${it.item_no}','jissei',this.value);insFormatInput(this)">
          </div>
          <div class="iv-input-grp">
            <span class="iv-input-lbl">入札 ¥</span>
            <input class="iv-input" type="text" inputmode="numeric" placeholder="未入力" value="${sB}"
              oninput="insSetField('${it.item_no}','bid',this.value);insFormatInput(this)">
          </div>
        </div>
        <div class="iv-calc-row" id="ins-calc-${it.item_no}"></div>
        ${it.item_no?(
          st==='pending'?`<div class="iv-judge-row">
            <button class="iv-judge-btn go" id="ins-go-${it.item_no}" onclick="insJudge('${it.item_no}','go')">GO</button>
            <button class="iv-judge-btn skip" id="ins-skip-${it.item_no}" onclick="insSkipPrompt('${it.item_no}')">見送り</button>
          </div>`
          :st==='bidding'?`<div class="iv-judge-row">
            <button class="iv-judge-btn go done" disabled>🎯 入札中（GO済）</button>
            <button class="iv-judge-btn undo" onclick="insUndo('${it.item_no}')">↩ 戻す</button>
          </div>`
          :(dec==='skip'?`<div class="iv-judge-row">
            <button class="iv-judge-btn skip done" disabled>見送り済 ✓${(decRec.reason_tags&&decRec.reason_tags.length)?'（'+decRec.reason_tags.join('・')+'）':''}</button>
            <button class="iv-judge-btn undo" onclick="insUndo('${it.item_no}')">↩ 戻す</button>
          </div>`
          :`<div class="iv-judge-row"><button class="iv-judge-btn ended done" disabled>🔚 終了（処理済み）</button></div>`)
        ):''}
        ${it.item_no?`<div class="ins-itemno"><span class="lbl">商品番号</span><span class="no">${it.item_no}</span></div>`:''}
        ${ecoURL?`<a class="iv-merc" style="background:#1558b0" href="${ecoURL}" target="_blank" rel="noopener">🔭 EcoAuc下見で探す<span style="font-size:9px;font-weight:500;margin-left:4px;opacity:.8">商品を探す</span></a>`:`<span class="iv-merc disabled">URL無し</span>`}
      </div>`;
    }).join(''):`<div class="empty">${insStatusFilter==='pending'?'✅ 未判断の商品はありません<br><span style="font-size:11px;color:var(--muted2)">全てGO/見送り済み。お疲れさまです</span>':(insStatusFilter==='bidding'?'入札中（GO済）の商品はありません':'処理済み（見送り・終了）の商品はありません')}</div>`}`;
  Object.keys(insEditsLoad()).forEach(k=>insUpdateCalc(k));
}

// ===== 成果物タブ（クロコの成果物一覧・artifacts.json） =====
let artifactsData = null;
const ART_TYPE_ICON = {'検算':'🧮','リサーチ':'🔍','分析':'📊','CSV':'📑','レポート':'📄','JSON':'🗂','その他':'📌'};
async function showArtifacts(){
  const main=document.getElementById('cards');
  if(!artifactsData){
    main.innerHTML='<div class="empty"><div style="font-size:28px;margin-bottom:8px">📄</div><div>読み込み中…</div></div>';
    try{
      const r=await fetch('data/artifacts.json?t='+Date.now(),{cache:'no-store'});
      if(!r.ok) throw new Error();
      artifactsData=await r.json();
    }catch(e){
      main.innerHTML='<div class="empty"><div style="font-size:28px;margin-bottom:8px">📄</div><div>成果物がまだありません</div><div style="font-size:11px;margin-top:6px;color:var(--muted2)">クロコが publish_artifact で書き出すと一覧に出ます</div></div>';
      return;
    }
  }
  renderArtifacts();
}
async function artRefresh(){ artifactsData=null; await showArtifacts(); }
function artGroupDate(d){ return d&&d.length>=8 ? `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}` : (d||'日付不明'); }
function renderArtifacts(){
  const main=document.getElementById('cards');
  if(!artifactsData) return;
  const items=artifactsData.items||[];
  // 日付ごとにグループ（新しい順・itemsは既に新しい順）
  const groups={}; const order=[];
  items.forEach(it=>{ const d=it.date||''; if(!(d in groups)){groups[d]=[];order.push(d);} groups[d].push(it); });
  const TGT=isIOS()?'':' target="_blank" rel="noopener"';
  main.innerHTML=`
    <div class="iv-header"><span class="iv-title">📄 クロコの成果物</span>
      <span class="iv-meta">${items.length}件 / 更新:${artifactsData.updated_at||'-'} <button class="wf-clear" style="margin-left:6px;min-height:28px;padding:3px 10px" onclick="artRefresh()">⟳</button></span></div>
    ${items.length? order.map(d=>`
      <div class="art-date">${artGroupDate(d)}</div>
      ${groups[d].map(it=>{
        const ic=ART_TYPE_ICON[it.type]||'📌';
        return `<div class="art-card">
          <div class="art-top"><span class="art-type">${ic} ${it.type||''}</span><span class="art-time">${it.created_at||''}</span></div>
          <div class="art-name">${it.title||it.name||''}</div>
          ${it.summary?`<div class="art-sum">${it.summary}</div>`:''}
          ${it.drive_url?`<a class="art-link" href="${it.drive_url}"${TGT}>📂 Driveで開く</a>`:`<span class="art-link disabled">Drive未保存</span>`}
        </div>`;
      }).join('')}
    `).join('') : '<div class="empty">成果物がまだありません</div>'}`;
}

  const cardsEl=document.getElementById('cards'); if(cardsEl) cardsEl.dataset.tab='list';
  const appEl0=document.querySelector('.app'); if(appEl0) appEl0.dataset.tab='list';
  await loadNgWords();
  currentDate = '2026-06-06';
  buildDateBar();
