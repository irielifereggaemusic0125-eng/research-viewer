<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Banshee リサーチビューア</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="仕入リサーチ">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2">
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=2">
<link rel="manifest" href="manifest.json?v=2">
<meta name="theme-color" content="#161616">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#161616; --surface:#1f1f1f; --surface2:#262626; --line:#333;
  --text:#e8e8e8; --muted:#9a9a9a; --muted2:#6f6f6f;
  --t1:#2ed47a; --t1d:#1d8f54; --t2:#4d9fff; --t2d:#2f6fc4; --t3:#ffb547; --t3d:#c47f12;
  --alert:#ff5c5c; --alert-bg:#2a1414; --accent:#4d9fff; --profit:#2ed47a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:12px 12px 70px}
.app{max-width:520px;margin:0 auto}
h1{font-size:16px;font-weight:700;text-align:center;margin-bottom:2px;color:var(--text)}
.sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:8px}
.updated-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.updated{font-size:10px;color:var(--muted2);text-align:center}
.refresh-btn{display:inline-flex;align-items:center;gap:5px;min-height:34px;padding:6px 14px;border-radius:18px;border:1.5px solid var(--t1);background:rgba(46,212,122,.12);color:var(--t1);font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.refresh-btn:active{background:rgba(46,212,122,.25)}
.refresh-btn[disabled]{opacity:.6;cursor:default}
.refresh-btn .rf-ico{font-size:14px;display:inline-block}
.refresh-btn.loading .rf-ico{animation:rf-spin .8s linear infinite}
@keyframes rf-spin{to{transform:rotate(360deg)}}

.date-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.date-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--muted);transition:.15s}
.date-btn.active{background:var(--t1);color:#0b1a12}

.filter-panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px}
.fgroup{margin-bottom:12px}
.fgroup:last-child{margin-bottom:0}
.fgroup-label{font-size:10px;font-weight:700;color:var(--t1);letter-spacing:.08em;margin-bottom:7px;display:flex;align-items:center;gap:4px}
.fgroup-label .ico{font-size:12px}
.fchips{display:flex;gap:7px;flex-wrap:wrap}
.fchip{flex:1;min-width:60px;min-height:42px;padding:6px 8px;border-radius:10px;border:1.5px solid var(--line);font-size:12px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--muted);transition:.12s;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.3}
.fchip .fc-sub{font-size:9px;font-weight:500;color:var(--muted2);margin-top:1px}
.fchip.on{background:var(--t1);border-color:var(--t1);color:#0b1a12}
.fchip.on .fc-sub{color:rgba(11,26,18,.8)}
.fchip.on-gold{background:var(--t1);border-color:var(--t1);color:#0b1a12}
.fchip.on-gold .fc-sub{color:rgba(11,26,18,.8)}
.fchip.on-silver{background:var(--t2);border-color:var(--t2);color:#08182e}
.fchip.on-silver .fc-sub{color:rgba(8,24,46,.8)}
.fchip.on-warn{background:var(--t3);border-color:var(--t3);color:#2a1c00}
.fchip.on-warn .fc-sub{color:rgba(42,28,0,.8)}
.sort-chips{display:flex;gap:7px;flex-wrap:wrap}
.sort-chip{padding:7px 12px;border-radius:18px;border:1.5px solid var(--line);font-size:11px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--muted)}
.sort-chip.on{background:var(--t2);border-color:var(--t2);color:#08182e}

.legend{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:12px}
.legend-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:.5px solid var(--line);font-size:11px}
.legend-row:last-child{border-bottom:none}
.legend-badge{font-size:15px;flex-shrink:0;width:22px;text-align:center}
.legend-text b{font-weight:700;color:var(--text)}
.legend-text .ldesc{color:var(--muted);font-size:10px;display:block;margin-top:1px}

.summary{display:flex;gap:8px;margin-bottom:12px}
.sum-item{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 5px;text-align:center;border-top:3px solid var(--line)}
.sum-item.t1{border-top-color:var(--t1)}
.sum-item.t2{border-top-color:var(--t2)}
.sum-item.t3{border-top-color:var(--t3)}
.sum-item.alert{border-top-color:var(--alert)}
.sum-num{font-size:22px;font-weight:700;color:var(--text)}
.sum-name{font-size:10px;font-weight:700;margin-top:1px;color:var(--text)}
.sum-lbl{font-size:8px;color:var(--muted);margin-top:2px;line-height:1.3}

.alert-banner{background:var(--alert-bg);border-radius:12px;padding:10px 12px;margin-bottom:12px;border-left:3px solid var(--alert)}
.alert-title{font-size:11px;font-weight:700;color:var(--alert);margin-bottom:4px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.card.tier1{border-left:4px solid var(--t1)}
.card.tier2{border-left:4px solid var(--t2)}
.card.tier3{border-left:4px solid var(--t3)}
.tier-strip{padding:6px 12px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:5px}
.tier-strip.tier1{background:rgba(46,212,122,.16);color:var(--t1)}
.tier-strip.tier2{background:rgba(77,159,255,.16);color:var(--t2)}
.tier-strip.tier3{background:rgba(255,181,71,.16);color:var(--t3)}
.tier-strip .ts-desc{font-weight:500;opacity:.85;font-size:9px}

.card-header{display:flex;align-items:center;padding:10px 12px 6px;gap:8px}
.card-title{flex:1}
.card-name{font-size:14px;font-weight:700;color:var(--text)}
.card-model{font-size:10px;color:var(--muted);margin-top:1px}
.card-rank{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--surface2);color:var(--muted);border:1px solid var(--line)}

.card-body{padding:0 12px 12px}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--line);font-size:12px}
.row:last-child{border-bottom:none}
.row-lbl{color:var(--muted)}
.row-val{font-weight:600;color:var(--text);text-align:right}
.row-val.green{color:var(--profit);font-weight:700}
.row-val.orange{color:var(--t3)}
.row-val.red{color:var(--alert)}
.row-val.url a{color:var(--accent);text-decoration:none;font-size:11px}

.status-line{font-size:10px;font-weight:700;padding:6px 8px;border-radius:8px;margin:8px 0 6px;line-height:1.4}
.status-line.listed{background:rgba(46,212,122,.14);color:var(--t1)}
.status-line.waiting{background:var(--surface2);color:var(--muted)}
.status-line.ended{background:rgba(120,120,130,.18);color:var(--muted2)}
.card-ended{opacity:.62}
.ended-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:8px;background:rgba(120,120,130,.22);color:var(--muted2);margin-left:4px}
.store-note{font-size:9px;color:var(--t3);background:rgba(255,181,71,.1);border-radius:8px;padding:5px 8px;margin:2px 0 6px;line-height:1.5}
.store-note b{font-weight:700}
.actions{display:flex;gap:8px;margin:0 0 4px}
.act-btn{flex:1;min-height:46px;border-radius:10px;border:none;font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px;cursor:pointer}
.act-btn.primary{background:var(--t1);color:#0b1a12}
.act-btn.primary:active{background:var(--t1d)}
.act-btn.search{background:rgba(77,159,255,.14);color:var(--accent);border:1.5px solid rgba(77,159,255,.35)}
.act-btn.search:active{background:rgba(77,159,255,.25)}
.act-btn .ab-sub{font-size:9px;font-weight:500;opacity:.85;margin-left:2px}

.note-box{background:var(--surface2);border-radius:8px;padding:6px 8px;margin-top:6px;font-size:10px;color:var(--muted);line-height:1.6}
.note-box.warn{background:rgba(255,181,71,.1);color:var(--t3)}
.note-box.danger{background:var(--alert-bg);color:var(--alert)}

.ending-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:var(--alert-bg);color:var(--alert);margin-left:4px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);display:flex;justify-content:space-between;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:100;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-btn{flex-shrink:0}
.nav-btn{font-size:9.5px;color:var(--muted);text-align:center;cursor:pointer;padding:4px 5px}
.nav-btn.active{color:var(--t1)}
.nav-icon{font-size:20px;display:block;margin-bottom:2px}
.nav-btn-link{text-decoration:none;border-left:1px solid var(--line);margin-left:2px;padding-left:7px;color:var(--accent, #7c6ff7) !important}

.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}

/* ③ 候補タブ専用UI: 他タブでは非表示（各タブは自分の機能だけ表示） */
.app:not([data-tab="list"]) .summary,
.app:not([data-tab="list"]) .legend,
.app:not([data-tab="list"]) .filter-panel,
.app:not([data-tab="list"]) #alert-area{display:none !important}
/* 日付バーは候補(list)と日別(archive)のみ */
.app:not([data-tab="list"]):not([data-tab="archive"]) .date-bar{display:none !important}
/* 更新ボタン(updated-bar)は候補・日別で表示（list系データ用）。他タブは隠す */
.app:not([data-tab="list"]):not([data-tab="archive"]) .updated-bar{display:none !important}

/* ===== 抽選タブ ===== */
#lottery-area{padding:0}
.lot-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.lot-title{font-size:14px;font-weight:700;color:var(--text)}
.lot-meta{font-size:10px;color:var(--muted2)}
.lot-cat-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.lot-cat-btn{flex-shrink:0;padding:6px 12px;border-radius:16px;border:1.5px solid var(--line);font-size:11px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--muted)}
.lot-cat-btn.on{background:var(--t3);border-color:var(--t3);color:#2a1c00}
/* 抽選カード */
.lot-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.lot-card.urgent{border-color:var(--alert)}
.lot-card.watch{border-color:var(--t3)}
.lot-strip{padding:5px 12px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:6px}
.lot-strip.urgent{background:rgba(255,92,92,.18);color:var(--alert)}
.lot-strip.watch{background:rgba(255,181,71,.16);color:var(--t3)}
.lot-strip.normal{background:var(--surface2);color:var(--muted)}
.lot-body{padding:10px 12px 12px}
.lot-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.lot-brand{font-size:10px;color:var(--muted);margin-bottom:8px}
.lot-rows{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.lot-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:.5px solid var(--line)}
.lot-row:last-child{border-bottom:none}
.lot-lbl{color:var(--muted)}
.lot-val{font-weight:600;color:var(--text)}
.lot-val.profit{color:var(--profit);font-weight:700}
.lot-val.deadline-soon{color:var(--alert);font-weight:700}
.lot-note{font-size:10px;color:var(--t3);background:rgba(255,181,71,.1);border-radius:7px;padding:5px 8px;margin:4px 0 8px;line-height:1.6}
.lot-actions{display:flex;gap:8px;align-items:center}
.lot-url-btn{flex:1;min-height:44px;border-radius:10px;border:none;font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px;background:var(--t3);color:#2a1c00;cursor:pointer}
.lot-url-btn:active{opacity:.8}
.lot-url-btn.disabled{background:var(--surface2);color:var(--muted);cursor:default}
.lot-status-btn{min-width:90px;min-height:44px;border-radius:10px;border:1.5px solid var(--line);font-size:11px;font-weight:700;cursor:pointer;background:var(--surface2);color:var(--muted);transition:.15s}
.lot-status-btn.applied{background:rgba(46,212,122,.14);border-color:var(--t1);color:var(--t1)}
/* フェーズ別ストリップ色 */
.lot-strip.phase-entry{background:rgba(255,92,92,.2);color:var(--alert)}
.lot-strip.phase-preview{background:rgba(77,159,255,.18);color:var(--t2)}
.lot-strip.phase-order{background:rgba(255,181,71,.18);color:var(--t3)}
.lot-strip.phase-wait{background:var(--surface2);color:var(--muted)}
.lot-strip.phase-end{background:var(--surface2);color:var(--muted2)}
.lot-card.phase-entry{border-color:var(--alert)}
.lot-card.phase-end{opacity:.6}
.lot-phase-badge{font-size:9px;font-weight:800;padding:1px 7px;border-radius:9px}
.lot-premium{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px}
.lot-premium.hi{background:rgba(255,92,92,.18);color:var(--alert)}
.lot-premium.mid{background:rgba(255,181,71,.16);color:var(--t3)}
.lot-premium.lo{background:var(--surface2);color:var(--muted)}
/* 応募先(routes)リスト */
.lot-routes{margin:6px 0 4px;border-top:.5px solid var(--line);padding-top:6px}
.lot-routes-ttl{font-size:9px;font-weight:700;color:var(--muted2);margin-bottom:5px;letter-spacing:.04em}
.lot-route{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:.5px solid var(--line)}
.lot-route:last-child{border-bottom:none}
.lot-route-main{flex:1;min-width:0}
.lot-route-store{font-size:11px;font-weight:700;color:var(--text)}
.lot-route-period{font-size:9px;color:var(--muted2);margin-top:1px}
.lot-route-ph{font-size:8px;font-weight:800;padding:1px 6px;border-radius:7px;flex-shrink:0}
.lot-route-ph.phase-entry{background:rgba(255,92,92,.2);color:var(--alert)}
.lot-route-ph.phase-preview{background:rgba(77,159,255,.18);color:var(--t2)}
.lot-route-ph.phase-order{background:rgba(255,181,71,.18);color:var(--t3)}
.lot-route-ph.phase-wait{background:var(--surface2);color:var(--muted)}
.lot-route-ph.phase-end{background:var(--surface2);color:var(--muted2)}
.lot-route-link{font-size:14px;text-decoration:none;flex-shrink:0;padding:4px 6px}
@media(min-width:768px){
  #lottery-area #lot-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;align-items:start}
  #lottery-area #lot-cards .lot-card{margin-bottom:0}
}
@media(min-width:1160px){
  #lottery-area #lot-cards{grid-template-columns:repeat(3,minmax(0,1fr))}
}

/* ===== ③ UI改善 2026-06-07 ===== */
/* メトリクスグリッド（指値/実勢/粗利/回転を4マス表示） */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:8px 0 6px}
.metric{background:var(--surface2);border-radius:8px;padding:6px 6px;text-align:center}
.metric-lbl{font-size:9px;color:var(--muted);margin-bottom:3px;font-weight:600;letter-spacing:.02em}
.metric-val{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.metric-val.green{color:var(--profit)}
.metric-val.orange{color:var(--t3)}
.metric-sub{font-size:9px;color:var(--muted2);margin-top:2px;line-height:1.2}
/* ⚠️ 警告カード強調（noteに⚠️含む） */
.card.warn-card{border-color:rgba(255,181,71,.6)}
.warn-flag{display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;background:rgba(255,92,92,.2);color:var(--alert);margin-left:auto;flex-shrink:0;white-space:nowrap}
/* スモールスクリーン：メトリクスを2×2 */
@media(max-width:360px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}

/* ===== 検索ワードタブ ===== */
.words-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.words-title{font-size:14px;font-weight:700;color:var(--text)}
.words-meta{font-size:10px;color:var(--muted2)}
.words-note{font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:12px;line-height:1.8}
.words-note b{color:var(--t2)}
.words-cat{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.words-cat.exclude-cat{border:1.5px solid rgba(255,92,92,.5)}
.words-cat-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.words-cat-hdr:active{background:var(--surface2)}
.words-cat-lbl{flex:1;font-size:13px;font-weight:700;color:var(--text)}
.words-cat-meta{font-size:10px;color:var(--muted2);flex-shrink:0}
.words-cat-arrow{font-size:11px;color:var(--muted2);flex-shrink:0;transition:transform .2s}
.words-cat-arrow.open{transform:rotate(180deg)}
.words-cat-body{border-top:1px solid var(--line)}
.word-row{padding:10px 14px;border-bottom:.5px solid var(--line);display:flex;flex-direction:column;gap:8px}
.word-row:last-child{border-bottom:none}
.word-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;word-break:break-all}
.word-btns{display:flex;gap:8px}
.word-btn{flex:1;min-height:42px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;transition:.12s;gap:4px;-webkit-tap-highlight-color:transparent}
.word-btn.yahoo{background:rgba(77,159,255,.14);color:var(--t2);border:1.5px solid rgba(77,159,255,.4)}
.word-btn.yahoo:active{background:rgba(77,159,255,.28)}
.word-btn.eco{background:rgba(46,212,122,.12);color:var(--t1);border:1.5px solid rgba(46,212,122,.35)}
.word-btn.eco:active{background:rgba(46,212,122,.24)}
.exclude-row{padding:8px 14px;display:flex;align-items:center;gap:6px}
.exclude-row .word-text{font-size:12px;color:var(--alert);font-weight:600}
/* 実績ランクセクション */
.wr-sec{margin-bottom:14px}
.wr-sec-hdr{font-size:12px;font-weight:700;color:var(--text);padding:8px 4px 6px;border-bottom:1.5px solid var(--line);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.wr-sec-n{font-size:10px;color:var(--muted2);font-weight:600}
.wr-perf{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.wr-badge{font-size:9px;font-weight:700;padding:1px 7px;border-radius:7px}
.wr-badge.k{background:rgba(77,159,255,.14);color:var(--t2)}
.wr-badge.r{background:rgba(46,212,122,.14);color:var(--t1)}
/* アコーディオン（カテゴリ開閉） */
.wr-acc{background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:9px;overflow:hidden}
.wr-acc-hdr{display:flex;align-items:center;gap:8px;padding:12px 13px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.wr-acc-hdr:active{background:var(--surface2)}
.wr-acc-lbl{flex:1;font-size:12.5px;font-weight:700;color:var(--text)}
.wr-acc-arrow{font-size:11px;color:var(--muted2);transition:transform .2s;flex-shrink:0}
.wr-acc-arrow.open{transform:rotate(180deg)}
.wr-acc-body{padding:4px 11px 11px;border-top:1px solid var(--line)}
/* 4ボタン(Y/E/M/G) 横並び・スマホ崩れ防止 */
.wf-item{display:block;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 11px;margin-bottom:9px}
.wf-item-word{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.4;word-break:break-all}
.wf-btns4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.wf-btn4{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:46px;border-radius:9px;border:1.5px solid var(--line);font-size:15px;font-weight:800;text-decoration:none;-webkit-tap-highlight-color:transparent;line-height:1.1}
.wf-btn4 .b4-sub{font-size:8px;font-weight:600;margin-top:2px;opacity:.85}
.wf-btn4.y{background:rgba(77,159,255,.14);color:var(--t2);border-color:rgba(77,159,255,.4)}
.wf-btn4.y:active{background:rgba(77,159,255,.28)}
.wf-btn4.e{background:rgba(46,212,122,.13);color:var(--t1);border-color:rgba(46,212,122,.4)}
.wf-btn4.e:active{background:rgba(46,212,122,.26)}
.wf-btn4.m{background:rgba(255,80,97,.14);color:#ff6373;border-color:rgba(255,80,97,.4)}
.wf-btn4.m:active{background:rgba(255,80,97,.28)}
.wf-btn4.g{background:rgba(255,181,71,.14);color:var(--t3);border-color:rgba(255,181,71,.4)}
.wf-btn4.g:active{background:rgba(255,181,71,.28)}
/* トースト通知 */
.copy-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(20,20,20,.96);color:var(--text);font-size:12px;font-weight:600;padding:10px 18px;border-radius:24px;border:1px solid var(--line);opacity:0;transition:opacity .2s,transform .2s;z-index:300;white-space:nowrap;pointer-events:none;max-width:calc(100vw - 40px);text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* 絞り込みフィルター */
.wf-panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 12px;margin-bottom:12px}
.wf-group{margin-bottom:10px}
.wf-group:last-child{margin-bottom:0}
.wf-glabel{font-size:10px;font-weight:700;color:var(--t1);letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.wf-chips{display:flex;gap:6px;flex-wrap:wrap}
.wf-chip{padding:6px 11px;border-radius:16px;border:1.5px solid var(--line);font-size:11px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--muted);transition:.12s;-webkit-tap-highlight-color:transparent}
.wf-chip.on{background:var(--t2);border-color:var(--t2);color:#08182e}
.wf-chip.prio.on{background:var(--t1);border-color:var(--t1);color:#0b1a12}
.wf-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.wf-count{font-size:12px;font-weight:700;color:var(--text)}
.wf-count b{color:var(--t1);font-size:15px}
.wf-clear{min-height:34px;padding:6px 14px;border-radius:18px;border:1.5px solid var(--alert);background:rgba(255,92,92,.1);color:var(--alert);font-size:11px;font-weight:700;cursor:pointer}
.wf-clear:active{background:rgba(255,92,92,.22)}
/* フラットなワード行 */
.wf-list{display:flex;flex-direction:column;gap:8px}
.wf-item{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 11px;display:flex;align-items:center;gap:8px}
.wf-item-main{flex:1;min-width:0}
.wf-item-word{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.4;word-break:break-all}
.wf-item-tags{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap}
.wf-tag{font-size:9px;font-weight:600;color:var(--muted2);background:var(--surface2);border-radius:6px;padding:1px 6px}
.wf-tag.axis{color:var(--t1);background:rgba(46,212,122,.12)}
.wf-btns{display:flex;gap:6px;flex-shrink:0}
.wf-btn{width:38px;height:40px;border-radius:9px;border:none;font-size:14px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;-webkit-tap-highlight-color:transparent}
.wf-btn.y{background:rgba(77,159,255,.16);color:var(--t2);border:1.5px solid rgba(77,159,255,.4)}
.wf-btn.y:active{background:rgba(77,159,255,.3)}
.wf-btn.e{background:rgba(46,212,122,.14);color:var(--t1);border:1.5px solid rgba(46,212,122,.4)}
.wf-btn.e:active{background:rgba(46,212,122,.28)}
.wf-exclude{margin-top:14px;border:1.5px solid rgba(255,92,92,.5);border-radius:12px;overflow:hidden}
.wf-exclude-hdr{background:rgba(255,92,92,.12);color:var(--alert);font-size:12px;font-weight:700;padding:9px 12px}
.wf-exclude-row{padding:7px 12px;font-size:11px;color:var(--alert);border-top:.5px solid rgba(255,92,92,.2)}
/* ===== 領収書タブ ===== */
.rc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.rc-title{font-size:14px;font-weight:700;color:var(--text)}
.rc-monthbar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin-bottom:12px}
.rc-monthbar label{font-size:11px;color:var(--muted);font-weight:600}
.rc-month-input{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:13px;font-weight:600;padding:8px 10px;min-height:40px;font-family:inherit}
.rc-fetchall{width:100%;min-height:48px;border-radius:12px;border:none;background:var(--t1);color:#0b1a12;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:6px}
.rc-fetchall:active{background:var(--t1d)}
.rc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.rc-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:9px;text-align:center}
.rc-card.placeholder{border:1.5px dashed var(--line);background:transparent;opacity:.5;justify-content:center;min-height:150px}
.rc-card-ico{font-size:30px;line-height:1}
.rc-card-name{font-size:13px;font-weight:700;color:var(--text)}
.rc-status{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px}
.rc-status.none{background:var(--surface2);color:var(--muted)}
.rc-status.ok{background:rgba(46,212,122,.16);color:var(--t1)}
.rc-status.err{background:rgba(255,92,92,.16);color:var(--alert)}
.rc-fetch-btn{width:100%;min-height:40px;border-radius:9px;border:1.5px solid var(--t2);background:rgba(77,159,255,.12);color:var(--t2);font-size:12px;font-weight:700;cursor:pointer}
.rc-fetch-btn:active{background:rgba(77,159,255,.26)}
.rc-ph-text{font-size:11px;color:var(--muted2);font-weight:600}
.rc-log-wrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.rc-log-hdr{font-size:11px;font-weight:700;color:var(--muted);padding:9px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.rc-log-clear{font-size:10px;color:var(--muted2);background:none;border:none;cursor:pointer;text-decoration:underline}
.rc-log{max-height:180px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;line-height:1.7;color:var(--muted)}
.rc-log-line{padding:1px 0;word-break:break-all}
.rc-log-line .lt{color:var(--muted2)}
.rc-log-empty{color:var(--muted2);font-style:italic}
@media(max-width:360px){.rc-grid{grid-template-columns:1fr}}
/* ===== 在庫タブ ===== */
.iv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.iv-title{font-size:14px;font-weight:700;color:var(--text)}
.iv-meta{font-size:10px;color:var(--muted2)}
.iv-filter{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.iv-fg{margin-bottom:9px}
.iv-fg:last-child{margin-bottom:0}
.iv-fl{font-size:10px;font-weight:700;color:var(--t1);letter-spacing:.05em;margin-bottom:6px}
.iv-chips{display:flex;gap:6px;flex-wrap:wrap}
.iv-chip{padding:6px 11px;border-radius:16px;border:1.5px solid var(--line);font-size:11px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--muted);-webkit-tap-highlight-color:transparent}
.iv-chip.on{background:var(--t2);border-color:var(--t2);color:#08182e}
.iv-chip.danger.on{background:var(--alert);border-color:var(--alert);color:#fff}
.iv-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.iv-count{font-size:12px;font-weight:700;color:var(--text)}
.iv-count b{color:var(--t1);font-size:15px}
.iv-sum{font-size:10px;color:var(--muted2)}
/* 在庫カード（経過日数で色分け） */
.iv-card{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--muted2);border-radius:12px;margin-bottom:10px;overflow:hidden}
.iv-card.warn{border-left-color:var(--t3)}
.iv-card.alert{border-left-color:var(--alert)}
.iv-card-top{display:flex;align-items:center;gap:8px;padding:10px 12px 4px}
.iv-card-no{font-size:10px;font-weight:700;color:var(--muted2);background:var(--surface2);border-radius:6px;padding:2px 7px;flex-shrink:0}
.iv-card-cat{font-size:9px;font-weight:600;color:var(--muted);margin-left:auto;flex-shrink:0}
.iv-days{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;flex-shrink:0}
.iv-days.ok{background:var(--surface2);color:var(--muted)}
.iv-days.warn{background:rgba(255,181,71,.18);color:var(--t3)}
.iv-days.alert{background:rgba(255,92,92,.2);color:var(--alert)}
.iv-name{font-size:13px;font-weight:700;color:var(--text);padding:2px 12px 8px;line-height:1.4}
.iv-rows{padding:0 12px}
.iv-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:.5px solid var(--line)}
.iv-row:last-child{border-bottom:none}
.iv-rl{color:var(--muted)}
.iv-rv{font-weight:600;color:var(--text)}
.iv-rv.loss{color:var(--t3)}
.iv-merc{display:block;margin:9px 12px 11px;min-height:42px;border-radius:9px;background:#ff5061;color:#fff;font-size:12px;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px}
.iv-merc.disabled{background:var(--surface2);color:var(--muted)}
.iv-merc:active{opacity:.85}
/* 下見: 粗利¥5,000以上の強調(緑系) */
.iv-card.ins-hi{border-left-color:var(--t1);border-color:rgba(46,212,122,.45);background:linear-gradient(0deg,rgba(46,212,122,.05),rgba(46,212,122,.05)),var(--surface)}
/* 下見: 実績バッジ(回転/粗利＝なぜ狙い目か) */
.ins-perf{display:flex;gap:5px;margin:2px 0 6px;flex-wrap:wrap}
.ins-pb{font-size:9px;font-weight:800;padding:1px 7px;border-radius:7px}
.ins-pb.k{background:rgba(77,159,255,.16);color:var(--t2)}
.ins-pb.r{background:rgba(46,212,122,.16);color:var(--t1)}
.ins-itemno{font-size:15px;font-weight:800;color:var(--text);margin:8px 0 4px;letter-spacing:.04em;background:var(--surface2);border:1.5px solid var(--line);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px}
.ins-itemno .lbl{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.ins-itemno .no{font-variant-numeric:tabular-nums;user-select:all}
/* ③ ステータス絞り込みバー（未判断/入札中/処理済み） */
.iv-status-bar{display:flex;gap:6px;margin:10px 0 4px;padding:0 2px}
.iv-stchip{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 4px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.iv-stchip .iv-stnum{font-size:16px;font-weight:800;color:var(--text)}
.iv-stchip.on.pending{border-color:var(--t2);background:rgba(77,159,255,.14);color:var(--t2)}
.iv-stchip.on.bidding{border-color:#ffcf6b;background:rgba(255,181,71,.16);color:#ffcf6b}
.iv-stchip.on.done{border-color:var(--muted);background:rgba(120,120,130,.18);color:var(--text)}
.iv-stchip.on .iv-stnum{color:inherit}
/* ③ カード上部のステータスバッジ */
.iv-stbadge{font-size:9px;font-weight:800;padding:1px 7px;border-radius:7px;white-space:nowrap}
.iv-stbadge.bidding{background:rgba(255,181,71,.2);color:#ffcf6b}
.iv-stbadge.skip{background:rgba(255,92,92,.14);color:var(--alert)}
.iv-stbadge.ended{background:rgba(120,120,130,.2);color:var(--muted2)}
/* ③ カード状態の見た目 */
.iv-card.ins-bidding{border-left-color:#ffcf6b;border-color:rgba(255,181,71,.4)}
.iv-card.ins-done{opacity:.66}
.iv-judge-btn.undo{flex:0 0 92px;background:var(--surface2);color:var(--muted);border:1.5px solid var(--line)}
.iv-judge-btn.ended{background:rgba(120,120,130,.14);color:var(--muted2)}
/* ③ 見送り理由モーダル */
.ins-modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:200;align-items:center;justify-content:center;padding:18px}
.ins-modal{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;width:100%;max-width:420px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.ins-modal-hd{font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px}
.ins-modal-sub{font-size:11px;font-weight:500;color:var(--muted);margin-top:3px;line-height:1.3}
.ins-rc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.ins-rc{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text);background:var(--surface2);border:1.5px solid var(--line);border-radius:9px;padding:9px 10px;cursor:pointer}
.ins-rc input{width:16px;height:16px;accent-color:var(--alert);flex-shrink:0}
.ins-rc:has(input:checked){border-color:var(--alert);background:rgba(255,92,92,.1)}
.ins-modal-note{width:100%;box-sizing:border-box;background:var(--surface2);border:1.5px solid var(--line);border-radius:9px;padding:10px;font-size:13px;color:var(--text);outline:none;margin-bottom:14px}
.ins-modal-note:focus{border-color:var(--accent)}
.ins-modal-btns{display:flex;gap:8px}
.ins-modal-btn{flex:1;min-height:44px;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;border:none}
.ins-modal-btn.cancel{background:var(--surface2);color:var(--muted);border:1.5px solid var(--line)}
.ins-modal-btn.ok{background:rgba(255,92,92,.16);color:var(--alert);border:1.5px solid rgba(255,92,92,.35)}
/* ③ 価格バンドの信頼度バッジ */
.band-conf{font-size:8px;font-weight:700;padding:0 5px;border-radius:6px;margin-left:4px;vertical-align:middle}
.band-conf.高{background:rgba(46,212,122,.18);color:var(--t1)}
.band-conf.中{background:rgba(255,181,71,.18);color:var(--t3)}
.band-conf.低{background:rgba(255,92,92,.16);color:var(--alert)}
/* ⑤ 狙い目フラグ */
.sniper-flag{font-size:9px;font-weight:800;padding:1px 7px;border-radius:8px;background:linear-gradient(90deg,rgba(255,181,71,.28),rgba(255,92,92,.22));color:#ffcf6b;margin-left:4px;white-space:nowrap}
/* 在庫: 価格バッジ */
.iv-badge-down{font-size:9px;font-weight:800;padding:1px 6px;border-radius:7px;background:rgba(255,92,92,.18);color:var(--alert);margin-left:4px}
.iv-badge-na{font-size:9px;font-weight:700;padding:1px 6px;border-radius:7px;background:var(--surface2);color:var(--muted2);margin-left:4px}
.iv-card.iv-eco{border-left-color:var(--t3)}
/* ⑤ 候補カードの実勢/入札入力ラッパ */
.cand-input-wrap{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
.cand-input-hint{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px}
/* 下見: 手入力実勢・入札額 */
.iv-input-row{display:flex;gap:8px;margin:8px 0 2px;flex-wrap:wrap}
.iv-input-grp{display:flex;flex:1;min-width:128px;align-items:center;gap:5px;background:var(--surface2);border:1.5px solid var(--line);border-radius:9px;padding:6px 10px}
.iv-input-grp:focus-within{border-color:var(--accent)}
.iv-input-lbl{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;flex-shrink:0}
.iv-input{background:transparent;border:none;outline:none;font-size:14px;font-weight:700;color:var(--text);width:100%;text-align:right;min-width:0}
.iv-input::placeholder{color:var(--muted2);font-weight:400;font-size:12px}
.iv-calc-row{font-size:11px;min-height:14px;padding:0 2px 6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.iv-calc-pos{color:var(--profit);font-weight:800}
.iv-calc-neg{color:var(--alert);font-weight:800}
.iv-calc-ratio{color:var(--t3);font-weight:700}
/* 下見: GO/見送りボタン */
.iv-judge-row{display:flex;gap:8px;margin:6px 0 4px}
.iv-judge-btn{flex:1;min-height:42px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent;border:none}
.iv-judge-btn.go{background:rgba(46,212,122,.15);color:var(--profit);border:1.5px solid rgba(46,212,122,.3)}
.iv-judge-btn.skip{background:rgba(255,92,92,.12);color:var(--alert);border:1.5px solid rgba(255,92,92,.25)}
.iv-judge-btn.done{opacity:.7;cursor:default}
.iv-judge-btn.loading{opacity:.5}
/* 成果物タブ */
.art-date{font-size:11px;font-weight:700;color:var(--t1);letter-spacing:.04em;margin:12px 2px 7px;padding-bottom:4px;border-bottom:1px solid var(--line)}
.art-card{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--t2);border-radius:11px;padding:10px 12px;margin-bottom:9px}
.art-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.art-type{font-size:10px;font-weight:700;color:var(--t2)}
.art-time{font-size:9px;color:var(--muted2)}
.art-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.4}
.art-sum{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.6}
.art-link{display:inline-block;margin-top:8px;min-height:38px;line-height:38px;padding:0 14px;border-radius:9px;background:rgba(77,159,255,.14);color:var(--t2);font-size:12px;font-weight:700;text-decoration:none}
.art-link.disabled{background:var(--surface2);color:var(--muted2)}
.art-link:active{opacity:.85}
/* NGワード: 除外グレーアウト・警告・バッジ（候補/下見共通） */
.ng-flag{font-size:9px;font-weight:800;padding:1px 6px;border-radius:7px;margin-right:4px;white-space:nowrap}
.ng-flag.ex{background:rgba(150,150,150,.22);color:var(--muted)}
.ng-flag.wn{background:rgba(255,181,71,.18);color:var(--t3)}
.card.ng-excluded,.iv-card.ng-excluded{opacity:.5;filter:grayscale(.6)}
.card.ng-warned,.iv-card.ng-warned{border-color:rgba(255,181,71,.5)}
/* ===== PC（≥768px）: グリッド表示 ===== */
@media(min-width:768px){
  body{padding:18px 20px 70px}
  .app{max-width:1360px}
  /* 上部コントロールは中央寄せの帯 */
  .date-bar,.filter-panel,.legend,.summary,.alert-banner{max-width:900px;margin-left:auto;margin-right:auto}
  /* 候補(list)タブのみ複数カラムグリッド。他タブは中央寄せの単一コンテナ */
  #cards[data-tab="list"]{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;align-items:start}
  #cards[data-tab="list"] .card{margin-bottom:0}
  #cards[data-tab="list"] .empty{grid-column:1/-1}
  /* 抽選/ワード/領収書/在庫タブ: 左右中央・読みやすい幅に固定（右寄り崩れ防止） */
  #cards[data-tab="lottery"],#cards[data-tab="words"],#cards[data-tab="receipts"],#cards[data-tab="inventory"],#cards[data-tab="inspect"],#cards[data-tab="artifacts"]{
    max-width:760px;margin-left:auto;margin-right:auto;display:block}
  .card-name{font-size:15px}
  .row{font-size:12.5px}
}
@media(min-width:1160px){
  #cards[data-tab="list"]{grid-template-columns:repeat(3,minmax(0,1fr))}
}
</style>
</head>
<body>

    <div class="legend-row">
      <div class="legend-badge">🥈</div>

        <button class="fchip" data-stock="listed" onclick="setStock('listed')">🟢出品中<span class="fc-sub">現物あり・即入札</span></button>
        <button class="fchip" data-stock="waiting" onclick="setStock('waiting')">⏳待ち受け<span class="fc-sub">出品待ち</span></button>

    </div>
    <!-- 絞り込み -->
    <div class="fgroup">

      <div class="fchips" id="tier-chips">
        <button class="fchip on" data-tier="all" onclick="setTier('all')">すべて<span class="fc-sub">全件</span></button>
        <button class="fchip" data-tier="Tier1" onclick="setTier('Tier1')">🥇確信MAX<span class="fc-sub">完全安全</span></button>
        <button class="fchip" data-tier="Tier2" onclick="setTier('Tier2')">🥈高確信<span class="fc-sub">p25安全</span></button>
        <button class="fchip" data-tier="Tier3" onclick="setTier('Tier3')">🔴要確認<span class="fc-sub">目視推奨</span></button>
      </div>
    </div>
    <!-- 条件 -->
    <div class="fgroup">
      <div class="fgroup-label"><span class="ico">⚙️</span>条件（追加で絞る）</div>
      <div class="fchips">
        <button class="fchip" id="chip-alert" onclick="toggleAlert()">⏰終了間近<span class="fc-sub">24h以内</span></button>
        <button class="fchip" id="chip-coherence" onclick="toggleCoherence()">✅整合のみ<span class="fc-sub">両回一致</span></button>
        <button class="fchip on" id="chip-nghide" onclick="toggleNgHide();this.classList.toggle('on',ngHideExcluded)">🚫除外を隠す<span class="fc-sub">NGワード</span></button>
        <button class="fchip" id="chip-ended" onclick="toggleEnded()">🔚終了も表示<span class="fc-sub" id="ended-sub">進行中のみ</span></button>

    <!-- 並び替え -->
    <div class="fgroup">

        <button class="sort-chip" data-sort="profit" onclick="setSort('profit')">粗利高い順</button>
        <button class="sort-chip" data-sort="jissei" onclick="setSort('jissei')">実勢高い順</button>
        <button class="sort-chip" data-sort="end" onclick="setSort('end')">終了早い順</button>
      </div>

  </div>

  <!-- 24hアラート -->
  <div id="alert-area"></div>

  <!-- 候補リスト -->

<script>
let allData = {};
let currentDate = '';
let lotteryData = null;
let lotCatFilter = 'all';
let lotStatuses = {};  // id(name+deadline) → status override ('未応募'|'応募済')
let filters = { tier: 'all', alert: false, coherence: false, sort: 'tier', stock: 'all', showEnded: false };

// 出品中判定: JSONのstatus='listed'を主・無ければ個別商品URL有無で代用
function isListed(c){
  if (c.status === 'listed') return true;
  if (c.status === 'waiting') return false;
  const u = c.url || '';
  return /page\.auctions\.yahoo\.co\.jp\/jp\/auction\/|ecoauc\.com\/client\/items\//.test(u);
}

// Tier日本語マッピング
const TIER_JP = { Tier1: '確信MAX', Tier2: '高確信', Tier3: '要確認' };
const TIER_ICON = { Tier1: '🥇', Tier2: '🥈', Tier3: '🔴' };
const TIER_DESC = {
  Tier1: '✅ 全出品が安全圏・両回完全一致',
  Tier2: '✅ 主流価格帯は健全（最安は外れ値）',
  Tier3: '⚠️ 底値競争あり・現物URLで目視確認を'
};
const TIER_CLASS = { Tier1: 'tier1', Tier2: 'tier2', Tier3: 'tier3' };

// 更新ボタン: 現在日のデータをキャッシュ回避で取り直す
async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  const lbl = document.getElementById('updated-label');
  const txt = document.getElementById('rf-txt');
  if (!currentDate) return;
  btn.classList.add('loading'); btn.disabled = true; txt.textContent = '取得中…';
  lbl.textContent = '最新を取得中…';
  delete allData[currentDate];                 // メモリキャッシュ破棄→強制再取得
  try {
    const r = await fetch(`data/banshee_research_${currentDate}.json?t=${Date.now()}`, { cache: 'no-store' });
    if (!r.ok) throw new Error('404');
    allData[currentDate] = await r.json();
    render();                                   // updated_at は render() 内で反映
  } catch(e) {
    lbl.textContent = '更新に失敗（通信を確認）';
  } finally {
    btn.classList.remove('loading'); btn.disabled = false; txt.textContent = '更新';
  }
}

async function loadDate(date) {
  if (allData[date]) { currentDate = date; render(); return; }
  try {
    const r = await fetch(`data/banshee_research_${date}.json?t=${Date.now()}`, { cache: 'no-store' });
    if (!r.ok) throw new Error('404');
    allData[date] = await r.json();
    currentDate = date;
    render();
  } catch(e) {
    document.getElementById('cards').innerHTML = `<div class="empty">この日のデータはありません<br>(${date})</div>`;
    document.getElementById('summary').innerHTML = '';
    document.getElementById('alert-area').innerHTML = '';
  }
}

function getAvailableDates() {
  const dates = [];
  const today = new Date('2026-06-06');
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

function buildDateBar() {
  const bar = document.getElementById('date-bar');
  const today = '2026-06-06';
  bar.innerHTML = getAvailableDates().map(d => {
    const label = d === today ? '今日' : d.slice(5).replace('-','/');
    return `<button class="date-btn ${d===currentDate?'active':''}" onclick="switchDate('${d}')">${label}</button>`;
  }).join('');
}

async function switchDate(date) {
  currentDate = date;
  buildDateBar();
  await loadDate(date);
}

// 終了日時パース（"6/10(水) 22:24" / "6/11 22:12" 等・曜日や全角混入に頑健）
function parseEnd(endStr) {
  if (!endStr || endStr === '—' || endStr === '要確認') return null;
  const m = String(endStr).match(/(\d{1,2})\s*\/\s*(\d{1,2}).*?(\d{1,2})\s*[:：]\s*(\d{1,2})/);
  if (!m) return null;
  return new Date(2026, (+m[1])-1, +m[2], +m[3], +m[4]);
}
function isEndingSoon(endStr) {
  const end = parseEnd(endStr);
  if (!end || isNaN(end)) return false;
  const diff = end - new Date();
  return diff < 24*3600*1000 && diff > 0;
}
function hoursLeft(endStr) {
  const end = parseEnd(endStr);
  if (!end || isNaN(end)) return null;
  const hrs = Math.round((end - new Date())/3600000);
  return hrs > 0 ? hrs : null;
}
// ④ 終了判定：終了日時が解析でき、かつ現在より過去ならオークション終了
function isEnded(endStr) {
  const end = parseEnd(endStr);
  if (!end || isNaN(end)) return false;   // 日付不明(—/要確認)は終了扱いにしない
  return (end - new Date()) <= 0;
}

function setTier(val) {
  filters.tier = val;
  document.querySelectorAll('#tier-chips .fchip').forEach(c => {
    c.classList.remove('on','on-gold','on-silver','on-warn');
    if (c.dataset.tier === val) {
      if (val==='Tier1') c.classList.add('on-gold');
      else if (val==='Tier2') c.classList.add('on-silver');
      else if (val==='Tier3') c.classList.add('on-warn');
      else c.classList.add('on');
    }
  });
  render();
}
function toggleAlert() {
  filters.alert = !filters.alert;
  document.getElementById('chip-alert').classList.toggle('on-warn', filters.alert);
  render();
}
function toggleEnded() {
  filters.showEnded = !filters.showEnded;
  document.getElementById('chip-ended').classList.toggle('on', filters.showEnded);
  const sub = document.getElementById('ended-sub');
  if (sub) sub.textContent = filters.showEnded ? '終了も表示中' : '進行中のみ';
  render();
}
function toggleCoherence() {
  filters.coherence = !filters.coherence;
  document.getElementById('chip-coherence').classList.toggle('on', filters.coherence);
  render();
}
function setStock(val) {
  filters.stock = val;
  document.querySelectorAll('#stock-chips .fchip').forEach(c => {
    c.classList.remove('on','on-gold','on-silver','on-warn');
    if (c.dataset.stock === val) c.classList.add(val==='listed' ? 'on' : (val==='waiting' ? 'on-warn' : 'on'));
  });
  render();
}
function setSort(val) {
  filters.sort = val;
  document.querySelectorAll('#sort-chips .sort-chip').forEach(c => c.classList.toggle('on', c.dataset.sort === val));
  render();
}

function render() {
  if (!currentDate || !allData[currentDate]) return;
  const data = allData[currentDate];
  let candidates = [...data.candidates];

  // 在庫状態フィルタ（出品中/待ち受け）
  if (filters.stock === 'listed') candidates = candidates.filter(c => isListed(c));
  else if (filters.stock === 'waiting') candidates = candidates.filter(c => !isListed(c));
  if (filters.tier !== 'all') candidates = candidates.filter(c => c.tier === filters.tier);
  if (filters.alert) candidates = candidates.filter(c => isEndingSoon(c.end));
  if (filters.coherence) candidates = candidates.filter(c => c.coherence && c.coherence.startsWith('✅'));
  // ④ 終了したヤフオク商品はデフォルト非表示（「終了も表示」ONで処理済みとして見返せる）
  const endedCount = data.candidates.filter(c => isEnded(c.end)).length;
  if (!filters.showEnded) candidates = candidates.filter(c => !isEnded(c.end));
  const endedSub = document.getElementById('ended-sub');
  if (endedSub) endedSub.textContent = filters.showEnded ? '終了も表示中' : (endedCount ? `${endedCount}件を非表示` : '進行中のみ');
  // NGワード除外（タイトルベース・トグルON時は除外カードを隠す）
  if (ngHideExcluded) candidates = candidates.filter(c => ngCheck(c.name)?.level !== 'exclude');

  // 出品中のみ表示時は終了が近い順を優先（入札判断に直行）
  let sort = filters.sort;
  if (filters.stock === 'listed' && sort === 'tier') sort = 'end';
  if (sort === 'profit') candidates.sort((a,b)=>(b.profit_eco||0)-(a.profit_eco||0));
  else if (sort === 'jissei') candidates.sort((a,b)=>(b.jissei||0)-(a.jissei||0));
  else if (sort === 'end') candidates.sort((a,b)=>((hoursLeft(a.end)??9999)-(hoursLeft(b.end)??9999)));
  else { const order={'Tier1':0,'Tier2':1,'Tier3':2}; candidates.sort((a,b)=>(order[a.tier]??9)-(order[b.tier]??9)); }

  document.getElementById('updated-label').textContent = `最終更新: ${data.updated_at}`;

  const all = data.candidates;
  document.getElementById('summary').innerHTML = `
    <div class="sum-item t1"><div class="sum-num" style="color:#0c6644">${all.filter(c=>c.tier==='Tier1').length}</div><div class="sum-name">🥇確信MAX</div><div class="sum-lbl">全出品安全</div></div>
    <div class="sum-item t2"><div class="sum-num" style="color:#1558b0">${all.filter(c=>c.tier==='Tier2').length}</div><div class="sum-name">🥈高確信</div><div class="sum-lbl">p25安全</div></div>
    <div class="sum-item t3"><div class="sum-num" style="color:#e07b00">${all.filter(c=>c.tier==='Tier3').length}</div><div class="sum-name">🔴要確認</div><div class="sum-lbl">目視推奨</div></div>
    <div class="sum-item alert"><div class="sum-num" style="color:#d03030">${all.filter(c=>isEndingSoon(c.end)).length}</div><div class="sum-name">⏰終了間近</div><div class="sum-lbl">24h以内</div></div>
  `;

  const ending = all.filter(c => isEndingSoon(c.end));
  document.getElementById('alert-area').innerHTML = ending.length ? `
    <div class="alert-banner">
      <div class="alert-title">⏰ 24時間以内に終了する候補 (${ending.length}件)</div>
      ${ending.map(c=>`<div style="font-size:11px;margin-top:2px">
        ${TIER_ICON[c.tier]} ${c.name} ─ 残り${hoursLeft(c.end)}h・指値${yen(c.yahoo_shitene)}
        ${c.url?`<a href="${c.url}" style="color:#2980e8;margin-left:4px">→URL</a>`:''}
      </div>`).join('')}
    </div>` : '';

  const cards = document.getElementById('cards');
  if (!candidates.length) { cards.innerHTML = '<div class="empty">該当候補なし<br>絞り込み条件を変えてください</div>'; return; }
  const candEdits = candEditsLoad();
  cards.innerHTML = candidates.map(c => {
    const tc = TIER_CLASS[c.tier] || '';
    const ck = candKey(c);
    const ce = candEdits[ck]||{};
    const ceJ = ce.jissei?ce.jissei.toLocaleString('ja-JP'):'';
    const ceB = ce.bid?ce.bid.toLocaleString('ja-JP'):'';
    const hrs = hoursLeft(c.end);
    const ended = isEnded(c.end);   // ④ 終了済み
    const endBadge = ended ? `<span class="ended-badge">🔚 終了</span>` : (hrs ? `<span class="ending-badge">残り${hrs}h</span>` : '');
    const noteClass = c.note && (c.note.includes('⚠️手動')||c.note.includes('⚠️目視')) ? 'danger' : (c.note ? 'warn' : '');
    const isWarnCard = c.note && c.note.includes('⚠️');
    const ng = ngCheck(c.name);   // NGワード判定(タイトルベース)
    const ngCls = ng ? (ng.level==='exclude'?' ng-excluded':' ng-warned') : '';
    const ngBadge = ng ? (ng.level==='exclude'
      ? `<span class="ng-flag ex">🚫 除外:${ng.word}</span>`
      : `<span class="ng-flag wn">⚠️ ${ng.word}</span>`) : '';
    return `
    <div class="card ${tc}${isWarnCard?' warn-card':''}${ngCls}${ended?' card-ended':''}">
      <div class="tier-strip ${tc}">
        ${TIER_ICON[c.tier]} ${TIER_JP[c.tier]||c.tier}
        <span class="ts-desc">─ ${TIER_DESC[c.tier]||''}</span>
        ${sniperBadge(c)}${ngBadge}${isWarnCard?`<span class="warn-flag">⚠️ 要確認</span>`:''}
      </div>
      <div class="card-header">
        <div class="card-title">
          <div class="card-name">${c.name}${endBadge}</div>
          <div class="card-model">${c.brand} / ${c.model}</div>
        </div>
        <div class="card-rank">ランク${c.rank}</div>
      </div>
      <div class="card-body">
        ${(()=>{const r=buildItemLinks(c);return `
        <div class="status-line ${ended?'ended':(r.listed?'listed':'waiting')}">${ended?'🔚 終了 ─ このオークションは終了しました（処理済み）':(r.listed?'🟢 出品中 ─ この1点の商品ページへ直行できます':'⏳ 待ち受け中 ─ 現在この型番の出品なし（検索で探す）')}</div>
        <div class="actions">
          ${r.links.map(l=>`<a class="act-btn ${l.cls}" href="${l.href}" target="_blank" rel="noopener"${l.onclick?` onclick="${l.onclick}"`:''}>${l.label}<span class="ab-sub">${l.sub}</span></a>`).join('')}
        </div>
        <div class="store-note">🏪 ヤフオク仕入＝<b>ストア限定</b>（pleasure / ROGUE / メルキャスト / brand LAQOL）・個人出品は対象外。検索後は該当ストア出品のみ拾う（ルーティンがsellerIDで自動フィルタ）</div>`;})()}
        <div class="row"><span class="row-lbl">ソース</span><span class="row-val">${c.source}</span></div>
        ${c.current_price!=null?`<div class="row"><span class="row-lbl">現在価格</span><span class="row-val">${yen(c.current_price)}</span></div>`:''}
        ${c.end&&c.end!=='—'?`<div class="row"><span class="row-lbl">終了日時</span><span class="row-val ${hrs&&hrs<24?'red':''}">${c.end}</span></div>`:''}
        <div class="metrics-grid">
          <div class="metric"><div class="metric-lbl">Eco指値</div><div class="metric-val green">${yen(c.eco_shitene)}</div><div class="metric-sub">Y${yen(c.yahoo_shitene)}</div></div>
          <div class="metric"><div class="metric-lbl">実勢${c.confidence?`<span class="band-conf ${c.confidence}">${c.confidence}</span>`:''}</div><div class="metric-val" style="font-size:${(c.jissei_low&&c.jissei_high)?'11px':'13px'}">${(c.jissei_low&&c.jissei_high)?`¥${(+c.jissei_low).toLocaleString('ja-JP')}〜${(+c.jissei_high).toLocaleString('ja-JP')}`:yen(c.jissei)}</div></div>
          <div class="metric"><div class="metric-lbl">粗利</div><div class="metric-val green">${yen(c.profit_eco)}</div></div>
          <div class="metric"><div class="metric-lbl">回転</div><div class="metric-val">${c.kaiten}<span style="font-size:10px;font-weight:500">日</span></div></div>
        </div>
        <div class="row"><span class="row-lbl">整合性</span><span class="row-val">${c.coherence}</span></div>
        <div class="row"><span class="row-lbl">サンプル</span><span class="row-val">n=${c.n40}件${c.n90?` / 90日n=${c.n90}件`:''}</span></div>
        ${c.note?`<div class="note-box ${noteClass}">${c.note}</div>`:''}
        ${ended?'':`<div class="cand-input-wrap">

function yen(n){ return n && n>0 ? '¥'+n.toLocaleString('ja-JP') : '—'; }

// ⑤ 候補(ヤフオク/Eco)の実勢¥・入札¥手入力（localStorage永続・下見と同仕様）
function _candHash(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}return (h>>>0).toString(36);}
function candKey(c){ return 'c_'+_candHash((c.aucid||'')+'|'+(c.url||'')+'|'+(c.brand||'')+'|'+(c.model||'')+'|'+(c.name||'')); }
const CAND_EDITS_KEY='cand_edits_v1';
function candEditsLoad(){try{return JSON.parse(localStorage.getItem(CAND_EDITS_KEY)||'{}');}catch(e){return{};}}
function candEditsSave(d){localStorage.setItem(CAND_EDITS_KEY,JSON.stringify(d));}
function candSetField(key,field,raw){
  const d=candEditsLoad(); if(!d[key])d[key]={};
  const v=parseInt(raw.replace(/[^\d]/g,''),10);
  if(v>0)d[key][field]=v; else delete d[key][field];
  if(!Object.keys(d[key]).length)delete d[key];
  candEditsSave(d); candUpdateCalc(key);
}
function candUpdateCalc(key){
  const el=document.getElementById('cand-calc-'+key); if(!el)return;
  const e=(candEditsLoad()[key])||{};
  const j=e.jissei||0,b=e.bid||0;
  if(!j&&!b){el.innerHTML='';return;}
  let html='';
  if(j&&b){
    const profit=Math.round(j*0.9-b),ratio=Math.round(b/j*100);
    const cls=profit>=0?'pos':'neg',sign=profit>=0?'+':'-';
    html=`<span class="iv-calc-${cls}">粗利 ${sign}¥${Math.abs(profit).toLocaleString('ja-JP')}</span><span style="color:var(--line);margin:0 4px">·</span><span class="iv-calc-ratio">入札/実勢 ${ratio}%</span>`;
  }else if(j){ html=`<span class="iv-calc-pos">売値×0.9 = ¥${Math.round(j*0.9).toLocaleString('ja-JP')}</span>`; }
  else{ html=`<span class="iv-calc-ratio">入札 ¥${b.toLocaleString('ja-JP')}</span>`; }
  el.innerHTML=html;
}

  const brandKw = c.brand_jp || BRAND_JP[c.brand] || c.brand;
  const baseKw = [brandKw, c.model].filter(Boolean).join(' ');
  const kw = encodeURIComponent(baseKw);                 // EcoAuc用(1円なし)

  links.push({cls: listed?'search':'primary', label:'🔍 ヤフオク1円', sub:'ストア限定で確認', onclick:'return yahooLink(this)',

const CAT_NAMES = {all:'すべて',A:'A.スニーカー',B:'B.ストリート',C:'C.ハイブランド',D:'D.コスメ',E:'E.トレカ',F:'F.iPhone',G:'G.カメラ',H:'H.ゲーム'};
const DEADLINE_SOON_DAYS = 2; // 締切N日以内を強調

function lotDeadlineHours(dl){
  if(!dl) return null;
  const d=new Date(dl);
  if(isNaN(d)) return null;
  return Math.round((d-new Date())/3600000);
}
function lotDeadlineLabel(dl){
  const h=lotDeadlineHours(dl);
  if(h===null) return '日程未定';
  if(h<0) return '締切済';
  if(h<24) return `⚠️あと${h}時間`;
  return `あと${Math.ceil(h/24)}日`;
}
function lotId(c){ return c.name+'|'+(c.deadline||''); }
function toggleLotStatus(id){
  const cur=lotStatuses[id]||'未応募';
  lotStatuses[id]=cur==='未応募'?'応募済':'未応募';
  renderLottery();
}
function setLotCat(cat){
  lotCatFilter=cat;
  document.querySelectorAll('.lot-cat-btn').forEach(b=>b.classList.toggle('on',b.dataset.cat===cat));
  renderLottery();
}

// フェーズ定義（優先度順・色クラス・ラベル）
const PHASE_DEF = {
  '受付中':   {rank:0, cls:'phase-entry',   icon:'🔴'},
  '予告':     {rank:1, cls:'phase-preview', icon:'🔵'},
  '注文中':   {rank:2, cls:'phase-order',   icon:'🟠'},
  '案内待ち': {rank:3, cls:'phase-wait',    icon:'⚪'},
  '終了':     {rank:4, cls:'phase-end',     icon:'✓'},
};
function lotPhase(c){
  if(c.phase && PHASE_DEF[c.phase]) return c.phase;
  // 旧スキーマ: deadline未来=受付中扱い・過去=終了
  const h=lotDeadlineHours(c.deadline);
  if(h===null) return '予告';
  return h>=0 ? '受付中' : '終了';
}
function premiumClass(lv){ return lv==='高'?'hi':lv==='中'?'mid':'lo'; }

function renderLottery(){
  const area=document.getElementById('lot-cards');
  if(!area) return;
  if(!lotteryData){area.innerHTML='<div class="empty">データなし</div>';return;}
  let items=[...lotteryData.candidates];
  if(lotCatFilter!=='all') items=items.filter(c=>c.category===lotCatFilter);
  // フェーズ優先→締切昇順
  items.sort((a,b)=>{
    const pa=PHASE_DEF[lotPhase(a)].rank, pb=PHASE_DEF[lotPhase(b)].rank;
    if(pa!==pb) return pa-pb;
    return (lotDeadlineHours(a.deadline)??99999)-(lotDeadlineHours(b.deadline)??99999);
  });
  if(!items.length){area.innerHTML='<div class="empty">該当なし</div>';return;}
  area.innerHTML=items.map(c=>{
    const id=lotId(c);
    const status=lotStatuses[id]||c.status||'未応募';
    const hrs=lotDeadlineHours(c.deadline);
    const phase=lotPhase(c);
    const pd=PHASE_DEF[phase];
    const isWatch=c.note&&(c.note.includes('WATCH')||c.note.includes('Watch'));
    const dlLabel=lotDeadlineLabel(c.deadline);
    const profit=c.profit_max||0;
    // プレ値率
    let premHtml='';
    if(c.premium_level){
      const rate=c.premium_rate?`${(+c.premium_rate).toFixed(2)}倍`:'';
      premHtml=`<span class="lot-premium ${premiumClass(c.premium_level)}">プレ値${rate} ${c.premium_level}</span>`;
    }
    // routes[]
    let routesHtml='';
    if(Array.isArray(c.routes)&&c.routes.length){
      routesHtml=`<div class="lot-routes"><div class="lot-routes-ttl">📍 応募先 ${c.routes.length}件</div>`+
        c.routes.map(r=>{
          const rp=PHASE_DEF[r.phase]||PHASE_DEF['予告'];
          let period='';
          if(r.entry_open||r.entry_deadline){
            const fmt=d=>d?new Date(d).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}):'';
            period=`受付 ${fmt(r.entry_open)}〜${fmt(r.entry_deadline)}`;
          }
          return `<div class="lot-route">
            <span class="lot-route-ph ${rp.cls}">${rp.icon}${r.phase||'予告'}</span>
            <div class="lot-route-main">
              <div class="lot-route-store">${r.store||''}</div>
              ${period?`<div class="lot-route-period">${period}${r.note?' ・'+r.note:''}</div>`:(r.note?`<div class="lot-route-period">${r.note}</div>`:'')}
            </div>
            ${r.url?`<a class="lot-route-link" href="${r.url}" target="_blank" rel="noopener" title="開く">🔗</a>`:''}
          </div>`;
        }).join('')+`</div>`;
    }
    return `<div class="lot-card ${pd.cls}">
  <div class="lot-strip ${pd.cls}">
    <span>${pd.icon}${phase} ・ ${CAT_NAMES[c.category]||c.category}${premHtml}</span>
    <span class="${hrs!==null&&hrs>=0&&hrs<24?'deadline-soon':''}">${dlLabel}</span>
  </div>
  <div class="lot-body">
    <div class="lot-name">${c.name}</div>
    <div class="lot-brand">${c.brand}</div>
    <div class="lot-rows">
      <div class="lot-row"><span class="lot-lbl">定価</span><span class="lot-val">${c.price>0?'¥'+c.price.toLocaleString('ja-JP'):'未定'}</span></div>
      ${c.jissei>0?`<div class="lot-row"><span class="lot-lbl">実勢</span><span class="lot-val">¥${(+c.jissei).toLocaleString('ja-JP')}</span></div>`:''}
      ${c.deadline?`<div class="lot-row"><span class="lot-lbl">直近締切</span><span class="lot-val ${hrs!==null&&hrs>=0&&hrs<24?'deadline-soon':''}">${new Date(c.deadline).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span></div>`:''}
      ${profit>0?`<div class="lot-row"><span class="lot-lbl">想定最大利益</span><span class="lot-val profit">+¥${profit.toLocaleString('ja-JP')}</span></div>`:''}
      ${c.best_route&&c.best_route!=='未判定（発売前）'&&c.best_route!=='発売後実機検証待ち'?`<div class="lot-row"><span class="lot-lbl">推奨販路</span><span class="lot-val">${c.best_route}</span></div>`:''}
    </div>
    ${routesHtml}
    ${c.note?`<div class="lot-note">${c.note}</div>`:''}
    <div class="lot-actions">
      ${c.url?`<a class="lot-url-btn" href="${c.url}" target="_blank" rel="noopener">🔗 応募ページを開く</a>`:`<span class="lot-url-btn disabled">URL未取得</span>`}
      <button class="lot-status-btn ${status==='応募済'?'applied':''}" onclick="toggleLotStatus('${id.replace(/'/g,'&apos;')}')">${status}</button>
    </div>
  </div>
</div>`;
  }).join('');
}

// 先頭の「1円 」を除去（メルカリ/Google用＝ブランド+商品名そのまま）
function stripIchien(w){ return w.replace(/^1円\s+/, ''); }
// E(EcoAuc)専用ワード生成：メジャー=ブランド名除去(型番/商品名のみ)・マイナー=ブランド名のみ
const ECO_MINOR_BRANDS = ['ロンワンズ','LONE ONES','レナードカムフォート','Leonard Kamhout','LEONARD KAMHOUT'];
const ECO_MAJOR_BRANDS = ['ルイヴィトン','シャネル','エルメス','プラダ','グッチ','ディオール','DIOR','フェンディ','FENDI','バレンシアガ','セリーヌ','カルティエ','ティファニー','ジミーチュウ','ヴェルサーチ','サンローラン','ジルサンダー'];
function ecoKeyword(w){
  let s = stripIchien(w).trim();
  for(const m of ECO_MINOR_BRANDS){ if(s.startsWith(m)) return m; }        // マイナー→ブランド名のみ
  for(const b of ECO_MAJOR_BRANDS){ if(s.startsWith(b)) return s.slice(b.length).trim() || b; } // メジャー→ブランド除去
  return s;
}
// アコーディオン開閉状態（主軸は既定で開く）
const openWordCats = new Set(['main_axis']);
function toggleWordCat(id){
  openWordCats.has(id) ? openWordCats.delete(id) : openWordCats.add(id);
  renderWords();
}

function renderWords() {
  const main = document.getElementById('cards');
  if (!wordsData) return;
  const cats = wordsData.categories;
  const realCount = cats.filter(c=>c.id!=='exclusions').reduce((s,c)=>s+c.words.length,0);
  const excludeCat = cats.find(c=>c.id==='exclusions');

  // iPhone=Safari同タブ(ログイン維持) / PC・Android=新規タブ
  const TGT = isIOS() ? '' : ' target="_blank" rel="noopener"';

  const sections = cats.filter(c=>c.id!=='exclusions').map(cat => {
    const open = openWordCats.has(cat.id);
    const body = cat.words.map(item => {
      const w = (typeof item === 'string') ? item : (item.word || '');   // 文字列/オブジェクト両対応
      const eco = stripIchien(w);            // M/G用: ブランド+商品名(1円のみ除去)
      const ecoE = ecoKeyword(w);            // E用: メジャー=ブランド除去/マイナー=ブランドのみ

function copyEco(word) {
  const done = () => showToast('コピー: ' + word);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(word).then(done).catch(() => fallbackCopy(word, done));
  } else {
    fallbackCopy(word, done);
  }
}
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta);
  if (cb) cb();
}

let toastTimer;
function showToast(msg) {
  let toast = document.getElementById('copy-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'copy-toast';
    toast.className = 'copy-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

let ngWords = { exclude: [], warn: [] };

async function loadNgWords(){
  try{
    const r = await fetch('data/ng_words.json?t='+Date.now(), {cache:'no-store'});
    if(r.ok){ const d = await r.json(); ngWords = { exclude: d.exclude||[], warn: d.warn||[] }; }

// テキストを判定 → {level:'exclude'|'warn', word} or null（allowは何もしない＝除外/警告に入れない）
function ngCheck(text){
  if(!text) return null;
  for(const w of ngWords.exclude){ if(w && text.includes(w)) return {level:'exclude', word:w}; }
  for(const w of ngWords.warn){ if(w && text.includes(w)) return {level:'warn', word:w}; }
  return null;
}

// ⑤ 狙い目フラグ（競争が少なく安く取れる可能性）。sniper_flag.py のJS版
const SNIPER_MINOR=['カムホート','カムフォート','ロンワン','ローンワンズ','羽根','鶴ベル','しずくベル','ヴィトン','シャネル風'];
const SNIPER_EN=['LOUIS VUITTON','CHANEL','HERMES','PRADA','GUCCI','LONE ONES','Leonard'];
function sniperFlag(it){
  const name=(it.name||it.model||'')+''; const sigs=[]; let s=0;
  const ic=it.image_count;
  if(ic!=null && ic<=2){sigs.push('写真少');s+=2;}
  if(it.image_dark){sigs.push('暗い');s+=1;}
  const hasKata=/[A-Z]{1,3}[-_ ]?\d{3,}|M\d{5}|US\d/.test(name);
  const hasEn=SNIPER_EN.some(b=>name.includes(b));
  if(!hasKata&&!hasEn&&name.length<22){sigs.push('雑タイトル');s+=2;}
  const es=(it.deadline||it.end||'')+''; const hm=es.match(/[T ](\d{1,2}):/); const h=hm?+hm[1]:null;
  if(h!=null&&h>=0&&h<=6){sigs.push('深夜終了');s+=2;}
  const nm=SNIPER_MINOR.filter(w=>name.includes(w));
  if(nm.length){sigs.push('表記ゆれ');s+=2;}
  if(it.bids===0){sigs.push('入札0');s+=1;}
  return {sniper:s>=3, score:s, signals:sigs};
}
function sniperBadge(it){
  const f=sniperFlag(it);
  return f.sniper?`<span class="sniper-flag" title="競争少・安く取れる可能性: ${f.signals.join('・')}">🎯狙い目</span>`:'';
}
