<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Banshee リサーチビューア</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="仕入リサーチ">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2">
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=2">
<link rel="manifest" href="manifest.json?v=2">
<meta name="theme-color" content="#161616">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#161616; --surface:#1f1f1f; --surface2:#262626; --line:#333;
  --text:#e8e8e8; --muted:#9a9a9a; --muted2:#6f6f6f;
  --t1:#2ed47a; --t1d:#1d8f54; --t2:#4d9fff; --t2d:#2f6fc4; --t3:#ffb547; --t3d:#c47f12;
  --alert:#ff5c5c; --alert-bg:#2a1414; --accent:#4d9fff; --profit:#2ed47a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:12px 12px 70px}
.app{max-width:520px;margin:0 auto}
h1{font-size:16px;font-weight:700;text-align:center;margin-bottom:2px;color:var(--text)}
.sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:8px}
.updated-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.updated{font-size:10px;color:var(--muted2);text-align:center}
.refresh-btn{display:inline-flex;align-items:center;gap:5px;min-height:34px;padding:6px 14px;border-radius:18px;border:1.5px solid var(--t1);background:rgba(46,212,122,.12);color:var(--t1);font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.refresh-btn:active{background:rgba(46,212,122,.25)}
.refresh-btn[disabled]{opacity:.6;cursor:default}
.refresh-btn .rf-ico{font-size:14px;display:inline-block}
.refresh-btn.loading .rf-ico{animation:rf-spin .8s linear infinite}
@keyframes rf-spin{to{transform:rotate(360deg)}}

.date-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.date-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--muted);transition:.15s}
.date-btn.active{background:var(--t1);color:#0b1a12}

.filter-panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px}
.fgroup{margin-bottom:12px}
.fgroup:last-child{margin-bottom:0}
.fgroup-label{font-size:10px;font-weight:700;color:var(--t1);letter-spacing:.08em;margin-bottom:7px;display:flex;align-items:center;gap:4px}
.fgroup-label .ico{font-size:12px}
.fchips{display:flex;gap:7px;flex-wrap:wrap}
.fchip{flex:1;min-width:60px;min-height:42px;padding:6px 8px;border-radius:10px;border:1.5px solid var(--line);font-size:12px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--muted);transition:.12s;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.3}
.fchip .fc-sub{font-size:9px;font-weight:500;color:var(--muted2);margin-top:1px}
.fchip.on{background:var(--t1);border-color:var(--t1);color:#0b1a12}
.fchip.on .fc-sub{color:rgba(11,26,18,.8)}
.fchip.on-gold{background:var(--t1);border-color:var(--t1);color:#0b1a12}
.fchip.on-gold .fc-sub{color:rgba(11,26,18,.8)}
.fchip.on-silver{background:var(--t2);border-color:var(--t2);color:#08182e}
.fchip.on-silver .fc-sub{color:rgba(8,24,46,.8)}
.fchip.on-warn{background:var(--t3);border-color:var(--t3);color:#2a1c00}
.fchip.on-warn .fc-sub{color:rgba(42,28,0,.8)}
.sort-chips{display:flex;gap:7px;flex-wrap:wrap}
.sort-chip{padding:7px 12px;border-radius:18px;border:1.5px solid var(--line);font-size:11px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--muted)}
.sort-chip.on{background:var(--t2);border-color:var(--t2);color:#08182e}

.legend{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:12px}
.legend-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:.5px solid var(--line);font-size:11px}
.legend-row:last-child{border-bottom:none}
.legend-badge{font-size:15px;flex-shrink:0;width:22px;text-align:center}
.legend-text b{font-weight:700;color:var(--text)}
.legend-text .ldesc{color:var(--muted);font-size:10px;display:block;margin-top:1px}

.summary{display:flex;gap:8px;margin-bottom:12px}
.sum-item{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 5px;text-align:center;border-top:3px solid var(--line)}
.sum-item.t1{border-top-color:var(--t1)}
.sum-item.t2{border-top-color:var(--t2)}
.sum-item.t3{border-top-color:var(--t3)}
.sum-item.alert{border-top-color:var(--alert)}
.sum-num{font-size:22px;font-weight:700;color:var(--text)}
.sum-name{font-size:10px;font-weight:700;margin-top:1px;color:var(--text)}
.sum-lbl{font-size:8px;color:var(--muted);margin-top:2px;line-height:1.3}

.alert-banner{background:var(--alert-bg);border-radius:12px;padding:10px 12px;margin-bottom:12px;border-left:3px solid var(--alert)}
.alert-title{font-size:11px;font-weight:700;color:var(--alert);margin-bottom:4px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.card.tier1{border-left:4px solid var(--t1)}
.card.tier2{border-left:4px solid var(--t2)}
.card.tier3{border-left:4px solid var(--t3)}
.tier-strip{padding:6px 12px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:5px}
.tier-strip.tier1{background:rgba(46,212,122,.16);color:var(--t1)}
.tier-strip.tier2{background:rgba(77,159,255,.16);color:var(--t2)}
.tier-strip.tier3{background:rgba(255,181,71,.16);color:var(--t3)}
.tier-strip .ts-desc{font-weight:500;opacity:.85;font-size:9px}

.card-header{display:flex;align-items:center;padding:10px 12px 6px;gap:8px}
.card-title{flex:1}
.card-name{font-size:14px;font-weight:700;color:var(--text)}
.card-model{font-size:10px;color:var(--muted);margin-top:1px}
.card-rank{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--surface2);color:var(--muted);border:1px solid var(--line)}

.card-body{padding:0 12px 12px}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--line);font-size:12px}
.row:last-child{border-bottom:none}
.row-lbl{color:var(--muted)}
.row-val{font-weight:600;color:var(--text);text-align:right}
.row-val.green{color:var(--profit);font-weight:700}
.row-val.orange{color:var(--t3)}
.row-val.red{color:var(--alert)}
.row-val.url a{color:var(--accent);text-decoration:none;font-size:11px}

.status-line{font-size:10px;font-weight:700;padding:6px 8px;border-radius:8px;margin:8px 0 6px;line-height:1.4}
.status-line.listed{background:rgba(46,212,122,.14);color:var(--t1)}
.status-line.waiting{background:var(--surface2);color:var(--muted)}
.store-note{font-size:9px;color:var(--t3);background:rgba(255,181,71,.1);border-radius:8px;padding:5px 8px;margin:2px 0 6px;line-height:1.5}
.store-note b{font-weight:700}
.actions{display:flex;gap:8px;margin:0 0 4px}
.act-btn{flex:1;min-height:46px;border-radius:10px;border:none;font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px;cursor:pointer}
.act-btn.primary{background:var(--t1);color:#0b1a12}
.act-btn.primary:active{background:var(--t1d)}
.act-btn.search{background:rgba(77,159,255,.14);color:var(--accent);border:1.5px solid rgba(77,159,255,.35)}
.act-btn.search:active{background:rgba(77,159,255,.25)}
.act-btn .ab-sub{font-size:9px;font-weight:500;opacity:.85;margin-left:2px}

.note-box{background:var(--surface2);border-radius:8px;padding:6px 8px;margin-top:6px;font-size:10px;color:var(--muted);line-height:1.6}
.note-box.warn{background:rgba(255,181,71,.1);color:var(--t3)}
.note-box.danger{background:var(--alert-bg);color:var(--alert)}

.ending-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:var(--alert-bg);color:var(--alert);margin-left:4px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100}
.nav-btn{font-size:9.5px;color:var(--muted);text-align:center;cursor:pointer;padding:4px 5px}
.nav-btn.active{color:var(--t1)}
.nav-icon{font-size:20px;display:block;margin-bottom:2px}

.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}

/* ③ 候補タブ専用UI: 他タブでは非表示（各タブは自分の機能だけ表示） */
.app:not([data-tab="list"]) .summary,
.app:not([data-tab="list"]) .legend,
.app:not([data-tab="list"]) .filter-panel,
.app:not([data-tab="list"]) #alert-area{display:none !important}
/* 日付バーは候補(list)と日別(archive)のみ */
.app:not([data-tab="list"]):not([data-tab="archive"]) .date-bar{display:none !important}
/* 更新ボタン(updated-bar)は候補・日別で表示（list系データ用）。他タブは隠す */
.app:not([data-tab="list"]):not([data-tab="archive"]) .updated-bar{display:none !important}

/* ===== 抽選タブ ===== */
#lottery-area{padding:0}
.lot-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.lot-title{font-size:14px;font-weight:700;color:var(--text)}
.lot-meta{font-size:10px;color:var(--muted2)}
.lot-cat-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.lot-cat-btn{flex-shrink:0;padding:6px 12px;border-radius:16px;border:1.5px solid var(--line);font-size:11px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--muted)}
.lot-cat-btn.on{background:var(--t3);border-color:var(--t3);color:#2a1c00}
/* 抽選カード */
.lot-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.lot-card.urgent{border-color:var(--alert)}
.lot-card.watch{border-color:var(--t3)}
.lot-strip{padding:5px 12px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:6px}
.lot-strip.urgent{background:rgba(255,92,92,.18);color:var(--alert)}
.lot-strip.watch{background:rgba(255,181,71,.16);color:var(--t3)}
.lot-strip.normal{background:var(--surface2);color:var(--muted)}
.lot-body{padding:10px 12px 12px}
.lot-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.lot-brand{font-size:10px;color:var(--muted);margin-bottom:8px}
.lot-rows{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.lot-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:.5px solid var(--line)}
.lot-row:last-child{border-bottom:none}
.lot-lbl{color:var(--muted)}
.lot-val{font-weight:600;color:var(--text)}
.lot-val.profit{color:var(--profit);font-weight:700}
.lot-val.deadline-soon{color:var(--alert);font-weight:700}
.lot-note{font-size:10px;color:var(--t3);background:rgba(255,181,71,.1);border-radius:7px;padding:5px 8px;margin:4px 0 8px;line-height:1.6}
.lot-actions{display:flex;gap:8px;align-items:center}
.lot-url-btn{flex:1;min-height:44px;border-radius:10px;border:none;font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px;background:var(--t3);color:#2a1c00;cursor:pointer}
.lot-url-btn:active{opacity:.8}
.lot-url-btn.disabled{background:var(--surface2);color:var(--muted);cursor:default}
.lot-status-btn{min-width:90px;min-height:44px;border-radius:10px;border:1.5px solid var(--line);font-size:11px;font-weight:700;cursor:pointer;background:var(--surface2);color:var(--muted);transition:.15s}
.lot-status-btn.applied{background:rgba(46,212,122,.14);border-color:var(--t1);color:var(--t1)}
/* フェーズ別ストリップ色 */
.lot-strip.phase-entry{background:rgba(255,92,92,.2);color:var(--alert)}
.lot-strip.phase-preview{background:rgba(77,159,255,.18);color:var(--t2)}
.lot-strip.phase-order{background:rgba(255,181,71,.18);color:var(--t3)}
.lot-strip.phase-wait{background:var(--surface2);color:var(--muted)}
.lot-strip.phase-end{background:var(--surface2);color:var(--muted2)}
.lot-card.phase-entry{border-color:var(--alert)}
.lot-card.phase-end{opacity:.6}
.lot-phase-badge{font-size:9px;font-weight:800;padding:1px 7px;border-radius:9px}
.lot-premium{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px}
.lot-premium.hi{background:rgba(255,92,92,.18);color:var(--alert)}
.lot-premium.mid{background:rgba(255,181,71,.16);color:var(--t3)}
.lot-premium.lo{background:var(--surface2);color:var(--muted)}
/* 応募先(routes)リスト */
.lot-routes{margin:6px 0 4px;border-top:.5px solid var(--line);padding-top:6px}
.lot-routes-ttl{font-size:9px;font-weight:700;color:var(--muted2);margin-bottom:5px;letter-spacing:.04em}
.lot-route{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:.5px solid var(--line)}
.lot-route:last-child{border-bottom:none}
.lot-route-main{flex:1;min-width:0}
.lot-route-store{font-size:11px;font-weight:700;color:var(--text)}
.lot-route-period{font-size:9px;color:var(--muted2);margin-top:1px}
.lot-route-ph{font-size:8px;font-weight:800;padding:1px 6px;border-radius:7px;flex-shrink:0}
.lot-route-ph.phase-entry{background:rgba(255,92,92,.2);color:var(--alert)}
.lot-route-ph.phase-preview{background:rgba(77,159,255,.18);color:var(--t2)}
.lot-route-ph.phase-order{background:rgba(255,181,71,.18);color:var(--t3)}
.lot-route-ph.phase-wait{background:var(--surface2);color:var(--muted)}
.lot-route-ph.phase-end{background:var(--surface2);color:var(--muted2)}
.lot-route-link{font-size:14px;text-decoration:none;flex-shrink:0;padding:4px 6px}
@media(min-width:768px){
  #lottery-area #lot-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;align-items:start}
  #lottery-area #lot-cards .lot-card{margin-bottom:0}
}
@media(min-width:1160px){
  #lottery-area #lot-cards{grid-template-columns:repeat(3,minmax(0,1fr))}
}

/* ===== ③ UI改善 2026-06-07 ===== */
/* メトリクスグリッド（指値/実勢/粗利/回転を4マス表示） */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:8px 0 6px}
.metric{background:var(--surface2);border-radius:8px;padding:6px 6px;text-align:center}
.metric-lbl{font-size:9px;color:var(--muted);margin-bottom:3px;font-weight:600;letter-spacing:.02em}
.metric-val{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.metric-val.green{color:var(--profit)}
.metric-val.orange{color:var(--t3)}
.metric-sub{font-size:9px;color:var(--muted2);margin-top:2px;line-height:1.2}
/* ⚠️ 警告カード強調（noteに⚠️含む） */
.card.warn-card{border-color:rgba(255,181,71,.6)}
.warn-flag{display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;background:rgba(255,92,92,.2);color:var(--alert);margin-left:auto;flex-shrink:0;white-space:nowrap}
/* スモールスクリーン：メトリクスを2×2 */
@media(max-width:360px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}

/* ===== 検索ワードタブ ===== */
.words-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.words-title{font-size:14px;font-weight:700;color:var(--text)}
.words-meta{font-size:10px;color:var(--muted2)}
.words-note{font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:12px;line-height:1.8}
.words-note b{color:var(--t2)}
.words-cat{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.words-cat.exclude-cat{border:1.5px solid rgba(255,92,92,.5)}
.words-cat-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.words-cat-hdr:active{background:var(--surface2)}
.words-cat-lbl{flex:1;font-size:13px;font-weight:700;color:var(--text)}
.words-cat-meta{font-size:10px;color:var(--muted2);flex-shrink:0}
.words-cat-arrow{font-size:11px;color:var(--muted2);flex-shrink:0;transition:transform .2s}
.words-cat-arrow.open{transform:rotate(180deg)}
.words-cat-body{border-top:1px solid var(--line)}
.word-row{padding:10px 14px;border-bottom:.5px solid var(--line);display:flex;flex-direction:column;gap:8px}
.word-row:last-child{border-bottom:none}
.word-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;word-break:break-all}
.word-btns{display:flex;gap:8px}
.word-btn{flex:1;min-height:42px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;transition:.12s;gap:4px;-webkit-tap-highlight-color:transparent}
.word-btn.yahoo{background:rgba(77,159,255,.14);color:var(--t2);border:1.5px solid rgba(77,159,255,.4)}
.word-btn.yahoo:active{background:rgba(77,159,255,.28)}
.word-btn.eco{background:rgba(46,212,122,.12);color:var(--t1);border:1.5px solid rgba(46,212,122,.35)}
.word-btn.eco:active{background:rgba(46,212,122,.24)}
.exclude-row{padding:8px 14px;display:flex;align-items:center;gap:6px}
.exclude-row .word-text{font-size:12px;color:var(--alert);font-weight:600}
/* 実績ランクセクション */
.wr-sec{margin-bottom:14px}
.wr-sec-hdr{font-size:12px;font-weight:700;color:var(--text);padding:8px 4px 6px;border-bottom:1.5px solid var(--line);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.wr-sec-n{font-size:10px;color:var(--muted2);font-weight:600}
.wr-perf{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.wr-badge{font-size:9px;font-weight:700;padding:1px 7px;border-radius:7px}
.wr-badge.k{background:rgba(77,159,255,.14);color:var(--t2)}
.wr-badge.r{background:rgba(46,212,122,.14);color:var(--t1)}
/* 4ボタン(Y/E/M/G) 横並び・スマホ崩れ防止 */
.wf-item{display:block;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 11px;margin-bottom:9px}
.wf-item-word{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.4;word-break:break-all}
.wf-btns4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.wf-btn4{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:46px;border-radius:9px;border:1.5px solid var(--line);font-size:15px;font-weight:800;text-decoration:none;-webkit-tap-highlight-color:transparent;line-height:1.1}
.wf-btn4 .b4-sub{font-size:8px;font-weight:600;margin-top:2px;opacity:.85}
.wf-btn4.y{background:rgba(77,159,255,.14);color:var(--t2);border-color:rgba(77,159,255,.4)}
.wf-btn4.y:active{background:rgba(77,159,255,.28)}
.wf-btn4.e{background:rgba(46,212,122,.13);color:var(--t1);border-color:rgba(46,212,122,.4)}
.wf-btn4.e:active{background:rgba(46,212,122,.26)}

<script>
let allData = {};
let currentDate = '';
let lotteryData = null;
let lotCatFilter = 'all';
let lotStatuses = {};  // id(name+deadline) → status override ('未応募'|'応募済')
let filters = { tier: 'all', alert: false, coherence: false, sort: 'tier', stock: 'all' };

// 出品中判定: JSONのstatus='listed'を主・無ければ個別商品URL有無で代用
function isListed(c){
  if (c.status === 'listed') return true;
  if (c.status === 'waiting') return false;
  const u = c.url || '';
  return /page\.auctions\.yahoo\.co\.jp\/jp\/auction\/|ecoauc\.com\/client\/items\//.test(u);
}

// Tier日本語マッピング
const TIER_JP = { Tier1: '確信MAX', Tier2: '高確信', Tier3: '要確認' };
const TIER_ICON = { Tier1: '🥇', Tier2: '🥈', Tier3: '🔴' };
const TIER_DESC = {
  Tier1: '✅ 全出品が安全圏・両回完全一致',
  Tier2: '✅ 主流価格帯は健全（最安は外れ値）',
  Tier3: '⚠️ 底値競争あり・現物URLで目視確認を'
};
const TIER_CLASS = { Tier1: 'tier1', Tier2: 'tier2', Tier3: 'tier3' };

// 更新ボタン: 現在日のデータをキャッシュ回避で取り直す
async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  const lbl = document.getElementById('updated-label');
  const txt = document.getElementById('rf-txt');
  if (!currentDate) return;
  btn.classList.add('loading'); btn.disabled = true; txt.textContent = '取得中…';
  lbl.textContent = '最新を取得中…';
  delete allData[currentDate];                 // メモリキャッシュ破棄→強制再取得
  try {
    const r = await fetch(`data/banshee_research_${currentDate}.json?t=${Date.now()}`, { cache: 'no-store' });
    if (!r.ok) throw new Error('404');
    allData[currentDate] = await r.json();
    render();                                   // updated_at は render() 内で反映
  } catch(e) {
    lbl.textContent = '更新に失敗（通信を確認）';
  } finally {
    btn.classList.remove('loading'); btn.disabled = false; txt.textContent = '更新';
  }
}

async function loadDate(date) {
  if (allData[date]) { currentDate = date; render(); return; }
  try {
    const r = await fetch(`data/banshee_research_${date}.json?t=${Date.now()}`, { cache: 'no-store' });
    if (!r.ok) throw new Error('404');
    allData[date] = await r.json();
    currentDate = date;
    render();
  } catch(e) {
    document.getElementById('cards').innerHTML = `<div class="empty">この日のデータはありません<br>(${date})</div>`;
    document.getElementById('summary').innerHTML = '';
    document.getElementById('alert-area').innerHTML = '';
  }
}

function getAvailableDates() {
  const dates = [];
  const today = new Date('2026-06-06');
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

function buildDateBar() {
  const bar = document.getElementById('date-bar');
  const today = '2026-06-06';
  bar.innerHTML = getAvailableDates().map(d => {
    const label = d === today ? '今日' : d.slice(5).replace('-','/');
    return `<button class="date-btn ${d===currentDate?'active':''}" onclick="switchDate('${d}')">${label}</button>`;
  }).join('');
}

async function switchDate(date) {
  currentDate = date;
  buildDateBar();
  await loadDate(date);
}

// 終了日時パース（"6/10(水) 22:24" / "6/11 22:12" 等・曜日や全角混入に頑健）
function parseEnd(endStr) {
  if (!endStr || endStr === '—' || endStr === '要確認') return null;
  const m = String(endStr).match(/(\d{1,2})\s*\/\s*(\d{1,2}).*?(\d{1,2})\s*[:：]\s*(\d{1,2})/);
  if (!m) return null;
  return new Date(2026, (+m[1])-1, +m[2], +m[3], +m[4]);
}
function isEndingSoon(endStr) {
  const end = parseEnd(endStr);
  if (!end || isNaN(end)) return false;
  const diff = end - new Date();
  return diff < 24*3600*1000 && diff > 0;
}
function hoursLeft(endStr) {
  const end = parseEnd(endStr);
  if (!end || isNaN(end)) return null;
  const hrs = Math.round((end - new Date())/3600000);
  return hrs > 0 ? hrs : null;
}

function setTier(val) {
  filters.tier = val;
  document.querySelectorAll('#tier-chips .fchip').forEach(c => {
    c.classList.remove('on','on-gold','on-silver','on-warn');
    if (c.dataset.tier === val) {
      if (val==='Tier1') c.classList.add('on-gold');
      else if (val==='Tier2') c.classList.add('on-silver');
      else if (val==='Tier3') c.classList.add('on-warn');
      else c.classList.add('on');
    }
  });
  render();
}
function toggleAlert() {
  filters.alert = !filters.alert;
  document.getElementById('chip-alert').classList.toggle('on-warn', filters.alert);
  render();
}
function toggleCoherence() {
  filters.coherence = !filters.coherence;
  document.getElementById('chip-coherence').classList.toggle('on', filters.coherence);
  render();
}
function setStock(val) {

    c.classList.remove('on','on-gold','on-silver','on-warn');

function setSort(val) {
  filters.sort = val;
  document.querySelectorAll('#sort-chips .sort-chip').forEach(c => c.classList.toggle('on', c.dataset.sort === val));
  render();
}

function render() {
  if (!currentDate || !allData[currentDate]) return;
  const data = allData[currentDate];
  let candidates = [...data.candidates];

  // 在庫状態フィルタ（出品中/待ち受け）
  if (filters.stock === 'listed') candidates = candidates.filter(c => isListed(c));
  else if (filters.stock === 'waiting') candidates = candidates.filter(c => !isListed(c));
  if (filters.tier !== 'all') candidates = candidates.filter(c => c.tier === filters.tier);
  if (filters.alert) candidates = candidates.filter(c => isEndingSoon(c.end));
  if (filters.coherence) candidates = candidates.filter(c => c.coherence && c.coherence.startsWith('✅'));

  // 出品中のみ表示時は終了が近い順を優先（入札判断に直行）
  let sort = filters.sort;
  if (filters.stock === 'listed' && sort === 'tier') sort = 'end';
  if (sort === 'profit') candidates.sort((a,b)=>(b.profit_eco||0)-(a.profit_eco||0));
  else if (sort === 'jissei') candidates.sort((a,b)=>(b.jissei||0)-(a.jissei||0));
  else if (sort === 'end') candidates.sort((a,b)=>((hoursLeft(a.end)??9999)-(hoursLeft(b.end)??9999)));
  else { const order={'Tier1':0,'Tier2':1,'Tier3':2}; candidates.sort((a,b)=>(order[a.tier]??9)-(order[b.tier]??9)); }

  document.getElementById('updated-label').textContent = `最終更新: ${data.updated_at}`;

  const all = data.candidates;
  document.getElementById('summary').innerHTML = `
    <div class="sum-item t1"><div class="sum-num" style="color:#0c6644">${all.filter(c=>c.tier==='Tier1').length}</div><div class="sum-name">🥇確信MAX</div><div class="sum-lbl">全出品安全</div></div>
    <div class="sum-item t2"><div class="sum-num" style="color:#1558b0">${all.filter(c=>c.tier==='Tier2').length}</div><div class="sum-name">🥈高確信</div><div class="sum-lbl">p25安全</div></div>
    <div class="sum-item t3"><div class="sum-num" style="color:#e07b00">${all.filter(c=>c.tier==='Tier3').length}</div><div class="sum-name">🔴要確認</div><div class="sum-lbl">目視推奨</div></div>
    <div class="sum-item alert"><div class="sum-num" style="color:#d03030">${all.filter(c=>isEndingSoon(c.end)).length}</div><div class="sum-name">⏰終了間近</div><div class="sum-lbl">24h以内</div></div>
  `;

  const ending = all.filter(c => isEndingSoon(c.end));
  document.getElementById('alert-area').innerHTML = ending.length ? `
    <div class="alert-banner">
      <div class="alert-title">⏰ 24時間以内に終了する候補 (${ending.length}件)</div>
      ${ending.map(c=>`<div style="font-size:11px;margin-top:2px">
        ${TIER_ICON[c.tier]} ${c.name} ─ 残り${hoursLeft(c.end)}h・指値${yen(c.yahoo_shitene)}
        ${c.url?`<a href="${c.url}" style="color:#2980e8;margin-left:4px">→URL</a>`:''}
      </div>`).join('')}
    </div>` : '';

  const cards = document.getElementById('cards');
  if (!candidates.length) { cards.innerHTML = '<div class="empty">該当候補なし<br>絞り込み条件を変えてください</div>'; return; }
  cards.innerHTML = candidates.map(c => {
    const tc = TIER_CLASS[c.tier] || '';
    const hrs = hoursLeft(c.end);
    const endBadge = hrs ? `<span class="ending-badge">残り${hrs}h</span>` : '';
    const noteClass = c.note && (c.note.includes('⚠️手動')||c.note.includes('⚠️目視')) ? 'danger' : (c.note ? 'warn' : '');
    const isWarnCard = c.note && c.note.includes('⚠️');

    <div class="card ${tc}${isWarnCard?' warn-card':''}">
      <div class="tier-strip ${tc}">
        ${TIER_ICON[c.tier]} ${TIER_JP[c.tier]||c.tier}
        <span class="ts-desc">─ ${TIER_DESC[c.tier]||''}</span>
        ${isWarnCard?`<span class="warn-flag">⚠️ 要確認</span>`:''}
      </div>
      <div class="card-header">
        <div class="card-title">
          <div class="card-name">${c.name}${endBadge}</div>
          <div class="card-model">${c.brand} / ${c.model}</div>
        </div>
        <div class="card-rank">ランク${c.rank}</div>
      </div>
      <div class="card-body">
        ${(()=>{const r=buildItemLinks(c);return `
        <div class="status-line ${r.listed?'listed':'waiting'}">${r.listed?'🟢 出品中 ─ この1点の商品ページへ直行できます':'⏳ 待ち受け中 ─ 現在この型番の出品なし（検索で探す）'}</div>

        </div>
        <div class="store-note">🏪 ヤフオク仕入＝<b>ストア限定</b>（pleasure / ROGUE / メルキャスト / brand LAQOL）・個人出品は対象外。検索後は該当ストア出品のみ拾う（ルーティンがsellerIDで自動フィルタ）</div>`;})()}
        <div class="row"><span class="row-lbl">ソース</span><span class="row-val">${c.source}</span></div>

function yen(n){ return n && n>0 ? '¥'+n.toLocaleString('ja-JP') : '—'; }

// ★現物リンク生成: 出品中(個別商品URL)＝商品ページ直行 / 待ち受け中＝検索ページ＋明記
function buildItemLinks(c){
  const links = [];
  // 個別商品URLがあるか（出品中＝その1点が存在）
  let itemUrl = '';
  if (c.url && c.url.startsWith('http')) itemUrl = c.url;
  else if (c.shohin_no && /ecoauc/i.test(c.source||'')) itemUrl = `https://www.ecoauc.com/client/items/${c.shohin_no}`;
  else if (c.aucid) itemUrl = `https://page.auctions.yahoo.co.jp/jp/auction/${c.aucid}`;
  const listed = !!itemUrl;

  if (listed) {
    // 出品中: その商品ページに直行
    links.push({cls:'primary', label:'🔗 商品ページを開く', sub:'出品中・この1点へ', href:itemUrl});
  }
  // 型番で各販路を検索（待ち受け中はこれが主・出品中も「他の出品」確認用）
  const BRAND_JP = {LV:'ルイヴィトン',HERMES:'エルメス',CHANEL:'シャネル',TIFFANY:'ティファニー',
    CARTIER:'カルティエ',CELINE:'セリーヌ',GUCCI:'グッチ',PRADA:'プラダ',DIOR:'ディオール',
    FENDI:'フェンディ',MARGIELA:'マルジェラ',YSL:'サンローラン',BALENCIAGA:'バレンシアガ',VERSACE:'ヴェルサーチ'};
  const brandKw = c.brand_jp || BRAND_JP[c.brand] || c.brand;
  const kw = encodeURIComponent([brandKw, c.model].filter(Boolean).join(' '));
  links.push({cls: listed?'search':'primary', label:'🔍 ヤフオク1円', sub:'ストア限定で確認', onclick:'return yahooLink(this)',
    href:`https://auctions.yahoo.co.jp/search/search?p=${kw}&aucminprice=1&aucmaxprice=1&istatus=2&n=50&s1=new&o1=d`});
  links.push({cls:'search', label:'🔍 EcoAuc', sub:'下見で探す',
    href:`https://www.ecoauc.com/client/auctions/inspect?q=${kw}&master_item_ranks[]=2&master_item_ranks[]=3&master_item_ranks[]=4`});
  return {links, listed};
}

// ===== 抽選タブ =====
const CAT_NAMES = {all:'すべて',A:'A.スニーカー',B:'B.ストリート',C:'C.ハイブランド',D:'D.コスメ',E:'E.トレカ',F:'F.iPhone',G:'G.カメラ',H:'H.ゲーム'};
const DEADLINE_SOON_DAYS = 2; // 締切N日以内を強調

function lotDeadlineHours(dl){
  if(!dl) return null;
  const d=new Date(dl);
  if(isNaN(d)) return null;
  return Math.round((d-new Date())/3600000);
}
function lotDeadlineLabel(dl){
  const h=lotDeadlineHours(dl);
  if(h===null) return '日程未定';
  if(h<0) return '締切済';
  if(h<24) return `⚠️あと${h}時間`;
  return `あと${Math.ceil(h/24)}日`;
}
function lotId(c){ return c.name+'|'+(c.deadline||''); }
function toggleLotStatus(id){
  const cur=lotStatuses[id]||'未応募';
  lotStatuses[id]=cur==='未応募'?'応募済':'未応募';
  renderLottery();
}
function setLotCat(cat){
  lotCatFilter=cat;
  document.querySelectorAll('.lot-cat-btn').forEach(b=>b.classList.toggle('on',b.dataset.cat===cat));
  renderLottery();
}

// フェーズ定義（優先度順・色クラス・ラベル）
const PHASE_DEF = {
  '受付中':   {rank:0, cls:'phase-entry',   icon:'🔴'},
  '予告':     {rank:1, cls:'phase-preview', icon:'🔵'},
  '注文中':   {rank:2, cls:'phase-order',   icon:'🟠'},
  '案内待ち': {rank:3, cls:'phase-wait',    icon:'⚪'},
  '終了':     {rank:4, cls:'phase-end',     icon:'✓'},
};
function lotPhase(c){
  if(c.phase && PHASE_DEF[c.phase]) return c.phase;
  // 旧スキーマ: deadline未来=受付中扱い・過去=終了
  const h=lotDeadlineHours(c.deadline);
  if(h===null) return '予告';
  return h>=0 ? '受付中' : '終了';
}
function premiumClass(lv){ return lv==='高'?'hi':lv==='中'?'mid':'lo'; }

function renderLottery(){
  const area=document.getElementById('lot-cards');
  if(!area) return;
  if(!lotteryData){area.innerHTML='<div class="empty">データなし</div>';return;}
  let items=[...lotteryData.candidates];
  if(lotCatFilter!=='all') items=items.filter(c=>c.category===lotCatFilter);
  // フェーズ優先→締切昇順
  items.sort((a,b)=>{
    const pa=PHASE_DEF[lotPhase(a)].rank, pb=PHASE_DEF[lotPhase(b)].rank;
    if(pa!==pb) return pa-pb;
    return (lotDeadlineHours(a.deadline)??99999)-(lotDeadlineHours(b.deadline)??99999);
  });
  if(!items.length){area.innerHTML='<div class="empty">該当なし</div>';return;}
  area.innerHTML=items.map(c=>{
    const id=lotId(c);
    const status=lotStatuses[id]||c.status||'未応募';
    const hrs=lotDeadlineHours(c.deadline);
    const phase=lotPhase(c);
    const pd=PHASE_DEF[phase];
    const isWatch=c.note&&(c.note.includes('WATCH')||c.note.includes('Watch'));
    const dlLabel=lotDeadlineLabel(c.deadline);
    const profit=c.profit_max||0;
    // プレ値率
    let premHtml='';
    if(c.premium_level){
      const rate=c.premium_rate?`${(+c.premium_rate).toFixed(2)}倍`:'';
      premHtml=`<span class="lot-premium ${premiumClass(c.premium_level)}">プレ値${rate} ${c.premium_level}</span>`;
    }
    // routes[]
    let routesHtml='';
    if(Array.isArray(c.routes)&&c.routes.length){
      routesHtml=`<div class="lot-routes"><div class="lot-routes-ttl">📍 応募先 ${c.routes.length}件</div>`+
        c.routes.map(r=>{
          const rp=PHASE_DEF[r.phase]||PHASE_DEF['予告'];
          let period='';
          if(r.entry_open||r.entry_deadline){
            const fmt=d=>d?new Date(d).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}):'';
            period=`受付 ${fmt(r.entry_open)}〜${fmt(r.entry_deadline)}`;
          }
          return `<div class="lot-route">
            <span class="lot-route-ph ${rp.cls}">${rp.icon}${r.phase||'予告'}</span>
            <div class="lot-route-main">
              <div class="lot-route-store">${r.store||''}</div>
              ${period?`<div class="lot-route-period">${period}${r.note?' ・'+r.note:''}</div>`:(r.note?`<div class="lot-route-period">${r.note}</div>`:'')}
            </div>
            ${r.url?`<a class="lot-route-link" href="${r.url}" target="_blank" rel="noopener" title="開く">🔗</a>`:''}
          </div>`;
        }).join('')+`</div>`;
    }
    return `<div class="lot-card ${pd.cls}">
  <div class="lot-strip ${pd.cls}">
    <span>${pd.icon}${phase} ・ ${CAT_NAMES[c.category]||c.category}${premHtml}</span>
    <span class="${hrs!==null&&hrs>=0&&hrs<24?'deadline-soon':''}">${dlLabel}</span>
  </div>
  <div class="lot-body">
    <div class="lot-name">${c.name}</div>
    <div class="lot-brand">${c.brand}</div>
    <div class="lot-rows">
      <div class="lot-row"><span class="lot-lbl">定価</span><span class="lot-val">${c.price>0?'¥'+c.price.toLocaleString('ja-JP'):'未定'}</span></div>
      ${c.jissei>0?`<div class="lot-row"><span class="lot-lbl">実勢</span><span class="lot-val">¥${(+c.jissei).toLocaleString('ja-JP')}</span></div>`:''}
      ${c.deadline?`<div class="lot-row"><span class="lot-lbl">直近締切</span><span class="lot-val ${hrs!==null&&hrs>=0&&hrs<24?'deadline-soon':''}">${new Date(c.deadline).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span></div>`:''}
      ${profit>0?`<div class="lot-row"><span class="lot-lbl">想定最大利益</span><span class="lot-val profit">+¥${profit.toLocaleString('ja-JP')}</span></div>`:''}
      ${c.best_route&&c.best_route!=='未判定（発売前）'&&c.best_route!=='発売後実機検証待ち'?`<div class="lot-row"><span class="lot-lbl">推奨販路</span><span class="lot-val">${c.best_route}</span></div>`:''}
    </div>
    ${routesHtml}
    ${c.note?`<div class="lot-note">${c.note}</div>`:''}
    <div class="lot-actions">
      ${c.url?`<a class="lot-url-btn" href="${c.url}" target="_blank" rel="noopener">🔗 応募ページを開く</a>`:`<span class="lot-url-btn disabled">URL未取得</span>`}
      <button class="lot-status-btn ${status==='応募済'?'applied':''}" onclick="toggleLotStatus('${id.replace(/'/g,'&apos;')}')">${status}</button>
    </div>
  </div>
</div>`;
  }).join('');
}

async function showLottery(){

<div id="lot-cards"><div class="empty">取得中…</div></div>`;

<div class="lot-cat-bar" id="lot-cat-bar"></div>
<div id="lot-cards"></div>`;

  // メタ
  const meta=document.getElementById('lot-meta');
  if(meta) meta.textContent=`${lotteryData.candidates.length}件 / 更新:${lotteryData.updated_at}`;
  // カテゴリフィルタ
  const catBar=document.getElementById('lot-cat-bar');
  if(catBar){
    const cats=['all',...new Set(lotteryData.candidates.map(c=>c.category))];
    catBar.innerHTML=cats.map(c=>`<button class="lot-cat-btn${c===lotCatFilter?' on':''}" data-cat="${c}" onclick="setLotCat('${c}')">${CAT_NAMES[c]||c}</button>`).join('');
  }
  renderLottery();
}

// ===== 検索ワードタブ（実績ランク制・1円先頭） =====
let wordsData = null;

async function showWords() {
  const main = document.getElementById('cards');
  if (!wordsData) {
    main.innerHTML = '<div class="empty"><div style="font-size:28px;margin-bottom:8px">🔍</div><div>読み込み中…</div></div>';
    try {
      const r = await fetch('data/search_words.json?t=' + Date.now(), {cache: 'no-store'});
      if (!r.ok) throw new Error();
      wordsData = await r.json();

      main.innerHTML = '<div class="empty">検索ワードデータを取得できませんでした</div>';
      return;
    }

  renderWords();
}

// 先頭の「1円 」を除去（EcoAuc用）
function stripIchien(w){ return w.replace(/^1円\s+/, ''); }

function renderWords() {
  const main = document.getElementById('cards');
  if (!wordsData) return;
  const cats = wordsData.categories;
  const realCount = cats.filter(c=>c.id!=='exclusions').reduce((s,c)=>s+c.words.length,0);
  const excludeCat = cats.find(c=>c.id==='exclusions');

  // iPhone=Safari同タブ(ログイン維持) / PC・Android=新規タブ
  const TGT = isIOS() ? '' : ' target="_blank" rel="noopener"';

  const sections = cats.filter(c=>c.id!=='exclusions').map(cat => `
    <div class="wr-sec">
      <div class="wr-sec-hdr">${cat.label}<span class="wr-sec-n">${cat.words.length}件</span></div>
      ${cat.words.map(item => {
        const w = item.word;                       // 「1円 ブランド 商品名」
        const eco = stripIchien(w);                // 先頭「1円 」除去
        const eW = encodeURIComponent(w);
        const eEco = encodeURIComponent(eco);
        // ①Y=ヤフオク(1円先頭そのまま・store限定) ②E=EcoAuc下見検索(1円除去)
        // ③M=メルカリSOLD(1円除去) ④G=Google画像検索(1円除去)
        const yahooUrl  = `https://auctions.yahoo.co.jp/search/search?p=${eW}&store=1`;
        const ecoUrl    = `https://www.ecoauc.com/client/auctions/inspect?q=${eEco}`;
        const mercUrl   = `https://jp.mercari.com/search?keyword=${eEco}&status=sold_out`;
        const googleUrl = `https://www.google.com/search?tbm=isch&q=${eEco}`;
        // 実績バッジ
        let perf = '';
        if (item.kaiten!=null || item.rieki!=null){
          const k = item.kaiten!=null ? `回転${item.kaiten}日` : '';
          const r = item.rieki!=null ? `粗利${item.rieki}%` : '';
          perf = `<div class="wr-perf">${k?`<span class="wr-badge k">${k}</span>`:''}${r?`<span class="wr-badge r">${r}</span>`:''}</div>`;
        }
        return `<div class="wf-item">
          <div class="wf-item-word">${w}</div>
          ${perf}
          <div class="wf-btns4">
            <a class="wf-btn4 y" href="${yahooUrl}"${TGT} title="ヤフオク検索(1円先頭)">Y<span class="b4-sub">ヤフオク</span></a>
            <a class="wf-btn4 e" href="${ecoUrl}"${TGT} title="EcoAuc下見検索">E<span class="b4-sub">エコオク</span></a>
            <a class="wf-btn4 m" href="${mercUrl}"${TGT} title="メルカリSOLD相場">M<span class="b4-sub">メルカリ</span></a>
            <a class="wf-btn4 g" href="${googleUrl}"${TGT} title="Google画像検索">G<span class="b4-sub">画像</span></a>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');

  main.innerHTML = `
    <div class="words-header">
      <span class="words-title">🔍 検索ワード（実績順）</span>
      <span class="words-meta">${realCount}件 / 更新:${wordsData.updated}</span>
    </div>
    <div class="words-note">
      <b>Y</b>ヤフオク（1円先頭・store）／<b>E</b>エコオク下見／<b>M</b>メルカリSOLD相場／<b>G</b>Google画像<br>
      E・M・Gは先頭「1円 」を自動除去。${isIOS()?'iPhoneは同じタブで開きログイン維持。':'PCは新規タブで開きます。'}
    </div>
    ${sections}
    ${excludeCat ? `<div class="wf-exclude">
      <div class="wf-exclude-hdr">${excludeCat.label}</div>
      ${excludeCat.words.map(x=>`<div class="wf-exclude-row">${x.word||x}</div>`).join('')}
    </div>` : ''}`;
}

function copyEco(word) {
  const done = () => showToast('コピー: ' + word);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(word).then(done).catch(() => fallbackCopy(word, done));
  } else {
    fallbackCopy(word, done);
  }
}
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta);
  if (cb) cb();
}

let toastTimer;
function showToast(msg) {
  let toast = document.getElementById('copy-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'copy-toast';
    toast.className = 'copy-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ===== ヤフオク アプリ起動（iOSのみアプリ・他はWeb） =====
function isIOS(){
  const ua = navigator.userAgent || '';
  return /iPhone|iPod|iPad/.test(ua) || (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1);
}
// アプリ(スキーム)起動を試行し、開かなければWebへフォールバック
function appOrWeb(scheme, webUrl){
  let switched = false;
  const onHide = () => { switched = true; };
  document.addEventListener('visibilitychange', onHide, {once:true});
  window.addEventListener('pagehide', onHide, {once:true});
  setTimeout(() => {
    document.removeEventListener('visibilitychange', onHide);
    window.removeEventListener('pagehide', onHide);
    if (!switched && !document.hidden) { window.location.href = webUrl; } // アプリ未起動→Web
  }, 1200);
  window.location.href = scheme; // スキーム起動試行
}
// ヤフオクリンクのクリック処理。iOSならアプリ、PC/Androidは通常Web(returnでデフォルト続行)
function yahooLink(el){
  const href = el.href;
  if (!isIOS()) return true;                         // PC/Android: 従来通りWeb
  // 検索リンク → アプリ内検索(テスト3確定: yjauctions://search?p=)
  if (href.indexOf('/search/search') !== -1){
    try{
      const u = new URL(href);
      const p = u.searchParams.get('p') || '';
      appOrWeb('yjauctions://search?p=' + encodeURIComponent(p), href);
      return false;
    }catch(e){ return true; }
  }
  // 個別商品ページ → アプリ形式が未確定のため現状はWeb(確認後に配線)
  return true;
}

// ===== 領収書タブ（スキャフォルド・取得処理は1Password CLI連携後に実装） =====
const RC_SITES = [
  { id:'ecoauc', icon:'🌿', name:'エコオク' },
  { id:'yahoo',  icon:'🔨', name:'ヤフオク' },
];
let rcMonth = '';            // "YYYY-MM"
let rcStatus = {};           // siteId → 'none'|'ok'|'err'
let rcLog = [];              // ログ行

function rcDefaultMonth(){
  // 既知の最新日付ベース（new Date()不可環境を考慮しdataの日付/2026-06を既定）
  const base = (wordsData && wordsData.updated) || '2026-06-07';
  return base.slice(0,7);
}
function rcPushLog(msg){
  rcLog.push({ t: (new Date()).toLocaleTimeString ? rcNow() : '', m: msg });
  const el = document.getElementById('rc-log');
  if (el) { rcRenderLog(); el.scrollTop = el.scrollHeight; }
}
function rcNow(){
  try { const d=new Date(); return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
  catch(e){ return ''; }
}
function rcRenderLog(){
  const el = document.getElementById('rc-log');
  if (!el) return;
  el.innerHTML = rcLog.length
    ? rcLog.map(l=>`<div class="rc-log-line"><span class="lt">${l.t?`[${l.t}] `:''}</span>${l.m}</div>`).join('')
    : '<div class="rc-log-empty">ログはまだありません</div>';
}
function rcClearLog(){ rcLog=[]; rcRenderLog(); }

function rcFetch(siteId){
  const site = RC_SITES.find(s=>s.id===siteId);
  if (!site) return;
  rcPushLog(`${site.icon} ${site.name}（${rcMonth}）取得リクエスト → 準備中（1Password CLI連携後に実装）`);
  showToast('準備中です');
}
function rcFetchAll(){
  rcPushLog(`▶ 全サイト一括取得（${rcMonth}）→ 準備中`);
  RC_SITES.forEach(s=>rcPushLog(`　${s.icon} ${s.name} → 準備中`));
  showToast('準備中です');
}
function rcSetMonth(v){ rcMonth = v; rcPushLog(`対象月を ${v} に変更`); }

function showReceipts(){
  if (!rcMonth) rcMonth = rcDefaultMonth();
  RC_SITES.forEach(s=>{ if(!(s.id in rcStatus)) rcStatus[s.id]='none'; });
  const main = document.getElementById('cards');
  const statusLabel = { none:'未取得', ok:'取得済み ✓', err:'エラー ×' };
  const siteCards = RC_SITES.map(s=>{
    const st = rcStatus[s.id]||'none';
    return `<div class="rc-card">
      <div class="rc-card-ico">${s.icon}</div>
      <div class="rc-card-name">${s.name}</div>
      <div class="rc-status ${st}">${statusLabel[st]}</div>
      <button class="rc-fetch-btn" onclick="rcFetch('${s.id}')">取得</button>
    </div>`;
  }).join('');
  // 将来追加枠（点線）×2
  const placeholders = [0,1].map(()=>`<div class="rc-card placeholder">
      <div class="rc-card-ico">＋</div>
      <div class="rc-ph-text">追加予定</div>
    </div>`).join('');

  main.innerHTML = `
    <div class="rc-header"><span class="rc-title">🧾 領収書 取得</span></div>
    <div class="rc-monthbar">
      <label>対象月</label>
      <input class="rc-month-input" type="month" value="${rcMonth}" onchange="rcSetMonth(this.value)">
    </div>
    <button class="rc-fetchall" onclick="rcFetchAll()">⬇ 全サイト一括取得</button>
    <div class="rc-grid">
      ${siteCards}
      ${placeholders}
    </div>
    <div class="rc-log-wrap">
      <div class="rc-log-hdr"><span>📋 取得ログ</span><button class="rc-log-clear" onclick="rcClearLog()">クリア</button></div>
      <div class="rc-log" id="rc-log"></div>
    </div>`;
  rcRenderLog();
}

// ===== 在庫タブ =====
let inventoryData = null;
const ivCats = new Set();     // カテゴリフィルタ（複数）
let ivStaleOnly = false;      // 60日以上のみ

const IV_CAT_ORDER = ['財布','アクセ','バッグ','その他'];

function ivDays(buyDate){
  if(!buyDate) return null;
  const d = new Date(buyDate);
  if(isNaN(d)) return null;
  return Math.floor((new Date() - d) / 86400000);
}
function ivLevel(days){
  if(days===null) return 'ok';
  if(days>=60) return 'alert';
  if(days>=30) return 'warn';
  return 'ok';
}
function ivYen(n){ return (n && n>0) ? '¥'+n.toLocaleString('ja-JP') : '—'; }

async function showInventory(){
  const main = document.getElementById('cards');
  if(!inventoryData){
    main.innerHTML = '<div class="empty"><div style="font-size:28px;margin-bottom:8px">📦</div><div>読み込み中…</div></div>';
    try{
      const r = await fetch('data/inventory.json?t=' + Date.now(), {cache:'no-store'});
      if(!r.ok) throw new Error();
      inventoryData = await r.json();
    }catch(e){
      main.innerHTML = '<div class="empty">在庫データを取得できませんでした</div>';
      return;
    }
  }
  renderInventory();
}

function ivToggleCat(c){ ivCats.has(c)?ivCats.delete(c):ivCats.add(c); renderInventory(); }
function ivToggleStale(){ ivStaleOnly=!ivStaleOnly; renderInventory(); }
function ivClear(){ ivCats.clear(); ivStaleOnly=false; renderInventory(); }

function renderInventory(){
  const main = document.getElementById('cards');
  if(!inventoryData) return;
  let items = inventoryData.items.map(it => ({...it, days: ivDays(it.buy_date)}));
  if(ivCats.size) items = items.filter(it => ivCats.has(it.category));
  if(ivStaleOnly) items = items.filter(it => it.days!==null && it.days>=60);
  // 経過日数の長い順（滞留が上）
  items.sort((a,b)=>(b.days??-1)-(a.days??-1));

  const catChips = IV_CAT_ORDER.map(c =>
    `<button class="iv-chip${ivCats.has(c)?' on':''}" onclick="ivToggleCat('${c}')">${c}</button>`).join('');
  const totalBuy = items.reduce((s,it)=>s+(it.buy_price||0),0);

  main.innerHTML = `
    <div class="iv-header">
      <span class="iv-title">📦 在庫</span>
      <span class="iv-meta">全${inventoryData.count}件 / 更新:${inventoryData.updated_at}</span>
    </div>
    <div class="iv-filter">
      <div class="iv-fg"><div class="iv-fl">📦 カテゴリ</div><div class="iv-chips">${catChips}</div></div>
      <div class="iv-fg"><div class="iv-fl">⏱ 滞留</div><div class="iv-chips">
        <button class="iv-chip danger${ivStaleOnly?' on':''}" onclick="ivToggleStale()">🔴 60日以上のみ</button>
      </div></div>
    </div>
    <div class="iv-bar">
      <span class="iv-count">表示: <b>${items.length}</b>件</span>
      <span class="iv-sum">仕入計 ${ivYen(totalBuy)}　<button class="wf-clear" onclick="ivClear()" style="margin-left:6px">✕ クリア</button></span>
    </div>
    ${items.length ? items.map(it=>{
      const lv = ivLevel(it.days);
      const daysLabel = it.days===null ? '日付不明' : `${it.days}日`;
      const mid = it.mercari_id || '';
      const mercUrl = mid ? `https://jp.mercari.com/item/${mid}` : '';
      return `<div class="iv-card ${lv}">
        <div class="iv-card-top">
          <span class="iv-card-no">${it.kanri_no||'—'}</span>
          <span class="iv-days ${lv}">${daysLabel}</span>
          <span class="iv-card-cat">${it.category||''}</span>
        </div>
        <div class="iv-name">${it.name||'(品名なし)'}</div>
        <div class="iv-rows">
          <div class="iv-row"><span class="iv-rl">仕入日</span><span class="iv-rv">${it.buy_date||'—'}</span></div>
          <div class="iv-row"><span class="iv-rl">仕入金額</span><span class="iv-rv">${ivYen(it.buy_price)}</span></div>
          <div class="iv-row"><span class="iv-rl">損切りライン</span><span class="iv-rv loss">${ivYen(it.loss_cut)}</span></div>
          <div class="iv-row"><span class="iv-rl">出品価格</span><span class="iv-rv">${ivYen(it.list_price)}</span></div>
        </div>
        ${mercUrl
          ? `<a class="iv-merc" href="${mercUrl}" target="_blank" rel="noopener">🛒 メルカリで見る</a>`
          : `<span class="iv-merc disabled">メルカリURL未登録</span>`}
      </div>`;
    }).join('') : '<div class="empty">該当する在庫なし<br>フィルタを変えてください</div>'}`;
}
