<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>買取判定 店頭ツール</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f172a; --card: #1e293b; --card2: #273449;
    --txt: #f1f5f9; --sub: #94a3b8; --line: #334155;
    --go: #22c55e; --gobg: #052e16; --gobd: #16a34a;
    --no: #ef4444; --nobg: #450a0a; --nobd: #dc2626;
    --accent: #38bdf8;
  }
  body {
    margin: 0; background: var(--bg); color: var(--txt);
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    padding: 12px 12px 80px; line-height: 1.4;
  }
  header {
    text-align: center; padding: 8px 0 14px;
  }
  header h1 { font-size: 19px; margin: 0 0 2px; }
  header .meta { font-size: 12px; color: var(--sub); }
  .summary {
    display: flex; gap: 8px; margin-bottom: 14px;
    font-size: 13px; font-weight: 700;
  }
  .summary div {
    flex: 1; text-align: center; padding: 8px 4px;
    border-radius: 10px; background: var(--card);
  }
  .summary .sgo { color: var(--go); }
  .summary .sno { color: var(--no); }
  .summary .spend { color: var(--sub); }

  .card {
    background: var(--card); border-radius: 14px; padding: 14px;
    margin-bottom: 12px; border: 2px solid var(--line);
    transition: border-color .15s, background .15s;
  }
  .card.go { border-color: var(--gobd); background: linear-gradient(var(--card), var(--gobg)); }
  .card.no { border-color: var(--nobd); background: linear-gradient(var(--card), var(--nobg)); }
  .card.oor { border-color: #a855f7; background: linear-gradient(var(--card), #2e1065); opacity:.92; }
  .badge.oor { color:#c084fc; }
  .oor-btn {
    margin-top:10px; width:100%; padding:9px; font-size:12px; font-weight:700;
    border-radius:9px; border:1px solid var(--line); background:var(--card2); color:var(--sub);
  }
  .card.oor .oor-btn { background:#3b0764; border-color:#a855f7; color:#e9d5ff; }
  .summary .soor { color:#c084fc; }

  .row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .no { font-size: 13px; font-weight: 800; color: var(--accent); white-space: nowrap; }
  .mgmt { font-size: 11px; color: var(--sub); }
  .name { font-size: 14px; margin: 6px 0 2px; font-weight: 600; }
  .cost {
    font-size: 13px; color: var(--sub); margin-bottom: 10px;
  }
  .cost b { color: var(--txt); font-size: 15px; }

  .inputwrap { display: flex; align-items: center; gap: 8px; }
  .inputwrap .yen { font-size: 20px; color: var(--sub); }
  input[type="number"] {
    flex: 1; font-size: 24px; font-weight: 700; padding: 12px 14px;
    border-radius: 10px; border: 2px solid var(--line);
    background: var(--card2); color: var(--txt); width: 100%;
    -moz-appearance: textfield;
  }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input:focus { outline: none; border-color: var(--accent); }

  .verdict {
    margin-top: 10px; display: flex; align-items: center; justify-content: space-between;
    min-height: 30px;
  }
  .badge { font-size: 20px; font-weight: 900; }
  .badge.go { color: var(--go); }
  .badge.no { color: var(--no); }
  .badge.idle { color: var(--sub); font-size: 14px; font-weight: 600; }
  .diff { font-size: 18px; font-weight: 800; }
  .diff.go { color: var(--go); }
  .diff.no { color: var(--no); }

  .bonus {
    margin-top: 8px; font-size: 12px; color: var(--sub);
    padding-top: 8px; border-top: 1px dashed var(--line);
  }
  .bonus b { color: var(--accent); }

  .toolbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15,23,42,.95); backdrop-filter: blur(6px);
    border-top: 1px solid var(--line); padding: 10px 12px;
    display: flex; gap: 8px;
  }
  .toolbar button {
    flex: 1; padding: 12px; font-size: 14px; font-weight: 700;
    border-radius: 10px; border: none; color: var(--txt);
  }
  .btn-save { background: var(--accent); color: #06283d; }
  .btn-clear { background: var(--card2); color: var(--sub); border: 1px solid var(--line); }
  .saved-note { text-align:center; font-size:12px; color:var(--sub); margin-top:6px; }
  .note { margin-top:8px; font-size:12px; font-weight:700; color:#fbbf24; }
  .be { font-size:12px; color:var(--sub); margin-top:2px; }
  .upbar {
    display:flex; align-items:center; gap:8px; justify-content:center;
    background:var(--card); border-radius:10px; padding:8px 12px; margin-bottom:14px;
    font-size:13px; font-weight:700;
  }
  .upbar input { width:70px; font-size:18px; font-weight:800; text-align:center;
    padding:6px 8px; border-radius:8px; border:2px solid var(--line);
    background:var(--card2); color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>🏪 買取判定 店頭ツール</h1>
  <div class="meta" id="meta"></div>
</header>

<div class="upbar">
  店頭買取UP <input type="number" id="upPct" value="0" inputmode="numeric" oninput="onUp()"> %
  <span style="color:var(--sub);font-weight:600;">（キャンペーン時に入力）</span>
</div>

<div class="summary">
  <div class="sgo">🟢 出す <span id="cgo">0</span></div>
  <div class="sno">🔴 持帰 <span id="cno">0</span></div>
  <div class="soor">⊘ 基準外 <span id="coor">0</span></div>
  <div class="spend">未入力 <span id="cpend">18</span></div>
</div>

<div id="list"></div>

<div class="saved-note" id="savednote"></div>

<div class="toolbar">
  <button class="btn-clear" onclick="clearAll()">全消去</button>
  <button class="btn-save" onclick="saveNow()">💾 記録を保存</button>
</div>

<script>
// ===== データ（管理表 金額列=仕入れ値 / 2026-06-16時点） =====
const ITEMS = [
  { no:"No20", mgmt:"A020-251102", name:"シャネル 06A イミテーションパール ココマーク ハート ネックレス", cost:34550, be:49458, note:"" },
  { no:"No70", mgmt:"A070-260319", name:"CHANEL ココマーク べっ甲調 サングラス 5365-A", cost:18250, be:26172, note:"" },
  { no:"No72", mgmt:"A072-260319", name:"PRADA 新品同様 サングラス SPR19W べっ甲調 ブラウン", cost:14850, be:21315, note:"" },
  { no:"No73", mgmt:"A073-260319", name:"TIFFANY 美品 エルサペレッティ ハートリング SV925 約9号", cost:13201, be:18959, note:"" },
  { no:"No69", mgmt:"B069-260318", name:"PRADA ナイロン⼱着ポーチ", cost:9350, be:13458, note:"" },
  { no:"No75", mgmt:"B075-260330", name:"ケイトスペード ハンドバッグ ブラック系 ナイロン×レザー", cost:2836, be:4152, note:"" },
  { no:"No86", mgmt:"B086-260426", name:"ルイヴィトン ライオン ハンドバッグ M92131 ダミエソバージュ", cost:19020, be:0, note:"保留中・委託¥31,460ライン" },
  { no:"No80", mgmt:"O080-260420", name:"HERMES エルメス アジェンダ オーストリッチ 手帳カバー ブラウン 本革", cost:10450, be:0, note:"" },
  { no:"No29", mgmt:"W029-251127", name:"グッチ 112521 2888 バンブー GG柄 GGキャンバス×レザー 二つ折り 財布", cost:7975, be:12677, note:"" },
  { no:"No44", mgmt:"W044-251223", name:"シャネル キャビアスキン マトラッセ コンパクトウォレット", cost:90980, be:130072, note:"eBay出品中($800)・高単価" },
  { no:"No54", mgmt:"W054-260126", name:"LOUIS VUITTON ルイヴィトン M61182 モノグラムアンプラント ポルトフォイユ サラ 二つ折り 長財布 ノワール ブラック", cost:17370, be:24915, note:"" },
  { no:"No56", mgmt:"W056-260130", name:"VALENTINO GARAVANI レザー ラウンドファスナー 長財布 黒×ゴールド", cost:6744, be:9735, note:"" },
  { no:"No57", mgmt:"W057-260202", name:"バレンシアガ 504564 ペーパーミニ レザー 三つ折り 財布", cost:7397, be:10668, note:"" },
  { no:"No61", mgmt:"W061-260212", name:"LOEWE ロエベ リピート アナグラム フラップ 長財布 ブラック ネイビー", cost:15400, be:22100, note:"" },
  { no:"No66", mgmt:"W066-260303", name:"BVLGARI ブルガリブルガリ レザー 長財布 ネイビー", cost:14961, be:21473, note:"" },
  { no:"No67", mgmt:"W067-260309", name:"シャネル キャビアスキン ボーイシャネル コンパクトウォレット 三つ折り財布", cost:43980, be:62929, note:"フリマ深掘り推奨・高単価" },
  { no:"No98", mgmt:"W098-260612", name:"PRADA プラダ サフィアーノレザー ヤシの木 ラウンドファスナー 長財布 イエロー系×マルチカラー", cost:12975, be:0, note:"" },
  { no:"No99", mgmt:"W099-260612", name:"LOUIS VUITTON ルイヴィトン M60775 モノグラムアンプラント ジッピーウォレット ラウンドファスナー 長財布 アプリコ", cost:12975, be:0, note:"" },
];
const STORE_KEY = "kaitori_assess_v2";

const yen = n => "¥" + Number(n).toLocaleString("ja-JP");
const signYen = n => (n>=0?"+":"−") + "¥" + Math.abs(n).toLocaleString("ja-JP");

function loadSaved(){
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch(e){ return {}; }
}
let saved = loadSaved();

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";
  ITEMS.forEach((it, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.id = "card-" + i;
    const sv = saved[it.no];
    const val = (sv != null && sv !== "OOR") ? sv : "";
    card.innerHTML = `
      <div class="row1">
        <span class="no">${it.no}</span>
        <span class="mgmt">${it.mgmt}</span>
      </div>
      <div class="name">${it.name}</div>
      <div class="cost">仕入れ値（赤字ライン）: <b>${yen(it.cost)}</b></div>
      ${it.be ? `<div class="be">フリマ手取り分岐: ${yen(it.be)}（これ未満ならセカストが得）</div>` : ``}
      ${it.note ? `<div class="note">⚠ ${it.note}</div>` : ``}
      <div class="inputwrap">
        <span class="yen">¥</span>
        <input type="number" inputmode="numeric" pattern="[0-9]*"
          id="in-${i}" value="${val}" placeholder="査定額を入力"
          oninput="onInput(${i})">
      </div>
      <div class="verdict" id="v-${i}">
        <span class="badge idle">査定額を入力してください</span>
      </div>
      <div class="bonus" id="b-${i}"></div>
      <button class="oor-btn" id="oor-${i}" onclick="toggleOOR(${i})">基準外（買取不可）にする</button>
    `;
    list.appendChild(card);
    evaluate(i, false);
  });
  updateSummary();
  showSavedNote();
}

function evaluate(i, persist){
  const it = ITEMS[i];
  const input = document.getElementById("in-"+i);
  const card = document.getElementById("card-"+i);
  const v = document.getElementById("v-"+i);
  const b = document.getElementById("b-"+i);
  const oorBtn = document.getElementById("oor-"+i);

  // 基準外（買取不可）状態が最優先
  if(saved[it.no] === "OOR"){
    card.className = "card oor";
    v.innerHTML = `<span class="badge oor">⊘ 基準外（買取不可）→ フリマ販売へ</span>`;
    b.innerHTML = `セカスト対象外。${it.be?`フリマで分岐${yen(it.be)}以上を狙う`:`フリマ販売継続`}`;
    if(oorBtn) oorBtn.textContent = "基準外を解除する";
    return;
  }
  if(oorBtn) oorBtn.textContent = "基準外（買取不可）にする";

  const raw = input.value.trim();

  if(raw === ""){
    card.className = "card";
    v.innerHTML = `<span class="badge idle">査定額を入力してください</span>`;
    b.innerHTML = "";
    if(persist){ delete saved[it.no]; persistState(); }
    return;
  }
  const assess = Math.round(Number(raw));
  const up = getUp();
  const eff = Math.round(assess * (1 + up/100)); // 買取UP%込みの実額
  const diff = eff - it.cost;
  const isGo = eff >= it.cost; // 厳格: 仕入れ値以上のみ出す

  card.className = "card " + (isGo ? "go" : "no");
  const effLabel = up>0 ? `（UP込${yen(eff)}）` : ``;
  v.innerHTML = `
    <span class="badge ${isGo?'go':'no'}">${isGo?'🟢 出す':'🔴 持ち帰る'}</span>
    <span class="diff ${isGo?'go':'no'}">${signYen(diff)}<span style="font-size:11px;color:var(--sub);font-weight:600;"> ${effLabel}</span></span>
  `;

  // フリマで売り続けた方が得か？（フリマ手取り分岐 be と比較）
  if(it.be){
    const beDiff = eff - it.be;
    b.innerHTML = beDiff >= 0
      ? `セカストが<b>フリマ手取り分岐(${yen(it.be)})も上回る</b> → 即現金化が有利 (${signYen(beDiff)})`
      : `フリマ分岐(${yen(it.be)})には<b>${signYen(beDiff)}</b> → 赤字回避ならフリマ継続も可`;
  } else {
    b.innerHTML = `フリマ分岐データなし（仕入れ値のみで判定）`;
  }

  if(persist){ saved[it.no] = assess; persistState(); }
}

function getUp(){
  const v = Number(document.getElementById("upPct").value);
  return (isFinite(v) && v>0) ? v : 0;
}

function onUp(){
  ITEMS.forEach((it,i)=>evaluate(i,false));
  updateSummary();
  localStorage.setItem("kaitori_up", document.getElementById("upPct").value);
}

function toggleOOR(i){
  const it = ITEMS[i];
  if(saved[it.no] === "OOR"){
    delete saved[it.no];
    const input = document.getElementById("in-"+i);
    if(input) input.value = "";
  } else {
    saved[it.no] = "OOR";
  }
  persistState();
  evaluate(i, false);
  updateSummary();
}

function onInput(i){
  evaluate(i, true);
  updateSummary();
}

function updateSummary(){
  let go=0, no=0, oor=0, pend=0;
  const up = getUp();
  ITEMS.forEach((it,i)=>{
    if(saved[it.no] === "OOR"){ oor++; return; }
    const raw = document.getElementById("in-"+i).value.trim();
    if(raw===""){ pend++; return; }
    const eff = Math.round(Number(raw) * (1 + up/100));
    if(eff >= it.cost) go++; else no++;
  });
  document.getElementById("cgo").textContent = go;
  document.getElementById("cno").textContent = no;
  document.getElementById("coor").textContent = oor;
  document.getElementById("cpend").textContent = pend;
}

function persistState(){
  localStorage.setItem(STORE_KEY, JSON.stringify(saved));
}

function saveNow(){
  // 現在の全入力を保存
  ITEMS.forEach((it,i)=>{
    if(saved[it.no] === "OOR") return; // 基準外は維持
    const raw = document.getElementById("in-"+i).value.trim();
    if(raw==="") delete saved[it.no];
    else saved[it.no] = Math.round(Number(raw));
  });
  saved._savedAt = new Date().toISOString();
  persistState();
  showSavedNote();
  const btn = document.querySelector(".btn-save");
  btn.textContent = "✅ 保存しました";
  setTimeout(()=>{ btn.textContent = "💾 記録を保存"; }, 1500);
}

function clearAll(){
  if(!confirm("入力した査定額を全て消去します。よろしいですか？")) return;
  saved = {};
  localStorage.removeItem(STORE_KEY);
  render();
}

function showSavedNote(){
  const note = document.getElementById("savednote");
  if(saved._savedAt){
    const d = new Date(saved._savedAt);
    note.textContent = "最終保存: " + d.toLocaleString("ja-JP", {month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
  } else {
    note.textContent = "入力は自動で端末に保存されます";
  }
}

// 買取UP%を復元
(function(){
  const u = localStorage.getItem("kaitori_up");
  if(u!=null) document.getElementById("upPct").value = u;
})();

// ヘッダー日付（動的）
(function(){
  const now = new Date();
  const ymd = now.getFullYear() + "/" + (now.getMonth()+1) + "/" + now.getDate();
  document.getElementById("meta").textContent =
    ymd + " 店頭査定 ／ 在庫" + ITEMS.length + "件 ／ 仕入れ値以上のみ🟢（買取UP%込で判定）";
})();

render();
</script>
</body>
</html>
